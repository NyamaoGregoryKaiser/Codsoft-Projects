```ini
[alembic]
# Path to migration scripts
script_location = migrations
# File where the current revision is stored
version_locations = %(script_location)s/versions
# Template for new migration files
file_template = %%(rev)s_%%(head)s_%%(branch)s_%%(message)s

# Revision identifiers.
# A full 32-character hex string or "long" identifiers will be used in the files
# but a shortened 12-character hex string will be used in the database.
revision_environment = false
revision_length = 12
# Set to 'true' to get autogen to detect changes in SQL column types
# See env.py for more comprehensive options.
compare_type = false

# Migration environment configuration (for `env.py`)
[post_write_hooks]
# none currently

[loggers]
keys = root, alembic, sqlalchemy

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[logger_root]
level = INFO
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy

```