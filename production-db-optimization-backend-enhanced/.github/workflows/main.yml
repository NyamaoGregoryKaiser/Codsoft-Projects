name: CI/CD Pipeline for DOMS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Set up Docker Compose (for DB and Redis during tests)
        run: |
          docker-compose -f docker-compose.yml up -d db redis
          # Wait for services to be healthy
          docker-compose -f docker-compose.yml ps
          docker-compose -f docker-compose.yml logs db redis
          timeout 60s bash -c 'until pg_isready -h localhost -p 5432 -U user; do echo waiting for postgres; sleep 2; done'
          echo "Postgres is up!"

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Run Prisma Migrations & Seed (for test database setup)
        run: |
          npx prisma migrate reset --force --skip-generate --skip-seed
          npx prisma generate
          npm run prisma:seed
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/doms_db?schema=public # Use test DB connection
          NODE_ENV: test # Ensure test environment is set

      - name: Run Backend Lint
        run: npm run lint
        working-directory: ./backend

      - name: Run Backend Tests
        run: npm test -- --coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/doms_db?schema=public # Use test DB connection
          REDIS_URL: redis://localhost:6379 # Use test Redis
          JWT_SECRET: test_jwt_secret
          NODE_ENV: test # Ensure test environment is set

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: ./backend/coverage

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run Frontend Lint
        run: npm run lint
        working-directory: ./frontend

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false --coverage
        working-directory: ./frontend
        env:
          CI: true # Important for Create React App test command in CI

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: ./frontend/coverage

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
        env:
          REACT_APP_API_BASE_URL: /api/v1 # Placeholder, will be replaced by actual deploy target

  deploy:
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend] # Ensure tests pass first
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: yourdockerhubusername/doms-backend:latest # Replace with your Docker Hub repo
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: yourdockerhubusername/doms-frontend:latest # Replace with your Docker Hub repo
          build-args: |
            REACT_APP_API_BASE_URL=${{ secrets.PROD_API_BASE_URL }} # Use actual production API URL
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deployment to a cloud provider (e.g., AWS EC2, Kubernetes, Heroku, etc.)
      # This part is highly dependent on your infrastructure.
      # Example for SSH-based deployment to an EC2 instance:
      - name: Deploy to Production Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/doms-project
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f # Clean up old images
```