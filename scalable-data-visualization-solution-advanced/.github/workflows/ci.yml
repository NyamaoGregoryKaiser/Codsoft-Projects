```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry (if used) or pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
        working-directory: ./backend

      - name: Run Black (Linting)
        run: pip install black && black --check .
        working-directory: ./backend

      - name: Run Flake8 (Linting)
        run: pip install flake8 && flake8 .
        working-directory: ./backend

      - name: Run Pytest (Backend Tests)
        run: |
          cp .env.example .env # Use example .env for tests
          pytest --cov=app --cov-report=xml
        working-directory: ./backend
        env:
          # Mock environment variables for tests
          POSTGRES_SERVER: localhost
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
          SECRET_KEY: test-secret-key
          REDIS_HOST: localhost # Mock or skip Redis connection in tests if not needed

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          verbose: true

  frontend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: ./frontend

      - name: Run ESLint
        run: yarn eslint src --ext .js,.jsx,.ts,.tsx
        working-directory: ./frontend

      - name: Run Prettier (Linting)
        run: yarn prettier --check .
        working-directory: ./frontend

      - name: Run Jest (Frontend Tests)
        run: yarn test --coverage --watchAll=false
        working-directory: ./frontend
        env:
          CI: true # Required for Jest in CI environments

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/clover.xml # Adjust path if Jest outputs to a different location
          flags: frontend
          verbose: true

  docker-build-push:
    needs: [backend-lint-test, frontend-lint-test] # Ensure tests pass before building
    if: github.ref == 'refs/heads/main' # Only push to registry on main branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: yourdockerhubusername/dataviz-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: yourdockerhubusername/dataviz-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
```