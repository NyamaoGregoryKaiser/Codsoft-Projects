```ini
[alembic]
script_location = backend/alembic
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@db:5432/app_db
# This is dynamic via .env in app/core/config.py, but Alembic needs it directly.
# You might need to update this during local dev or use a dynamic env var resolver.

# template used to generate new migrations
# generic, postgres, oracle, mssql, mysql
# revision_environment =
# revision_filename =
# revision_comment =
# revision_date_format =

# When using a SQLAlchemy 2.0+ engine, set to 'true' to suppress a warning.
# Typically, you'll specify this in env.py based on your application's engine config.
# If your application uses 'future=True' (asyncpg does), you should set this.
# This value can also be controlled by the `dialect` argument on the `create_engine` call
# in `env.py` when `target_metadata` is configured.
# You will likely want to configure `dialect_opts={"paramstyle":"named"}` if you are
# upgrading from a 1.x style `create_engine` that included the `future=True` option.
#
# See https://alembic.sqlalchemy.org/en/latest/cookbook.html#running-migrations-with-sqlalchemy-2-0-style-engines
#
# For asyncpg, create_async_engine automatically configures `future=True`.
# So, we should ensure `env.py` handles this.
# Don't set here directly, let env.py handle it based on setup.

[logging]
level = INFO
handlers = console
qualname = alembic
```