```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/test_db?schema=public
      JWT_SECRET: testsecret
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: testrefreshsecret
      JWT_REFRES_EXPIRES_IN: 7d

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install backend dependencies
        working-directory: ./backend
        run: yarn install

      - name: Wait for PostgreSQL to be ready
        run: sleep 10 # Give postgres time to start

      - name: Run Prisma migrations
        working-directory: ./backend
        run: yarn prisma migrate deploy

      - name: Run backend tests
        working-directory: ./backend
        run: yarn test:cov

      - name: Build backend
        working-directory: ./backend
        run: yarn build

  build-and-test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install

      - name: Run frontend tests
        working-directory: ./frontend
        run: yarn test

      - name: Build frontend
        working-directory: ./frontend
        run: yarn build

