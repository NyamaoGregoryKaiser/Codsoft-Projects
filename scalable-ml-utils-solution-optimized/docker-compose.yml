version: '3.8'

services:
  db:
    image: postgres:13
    container_name: ml-utilities-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ml_utilities}
    volumes:
      - ml-utilities-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:6-alpine
    container_name: ml-utilities-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ml-utilities-backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-ml_utilities}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      ORIGIN: ${ORIGIN:-http://localhost:80} # Frontend URL within docker network
      UPLOAD_DIR: ./uploads
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    volumes:
      - ./server/uploads:/app/uploads # Persist uploaded files
      - ./server/logs:/app/logs # Persist logs
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    # Run migrations and seed on startup (for dev/test, use separate CI/CD step for prod)
    # entrypoint: ["/bin/sh", "-c", "npx prisma migrate deploy && node scripts/seed.js && npm start"]
    entrypoint: ["/bin/sh", "-c", "npx prisma migrate deploy && npm start"] # For production, seed might be run separately

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ml-utilities-frontend
    restart: always
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api # Points to backend container directly
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  ml-utilities-db: