name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ml_utilities_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: ./server
        run: npm install

      - name: Wait for PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client && pg_isready -h localhost -p 5432 -U user

      - name: Setup test database schema
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/ml_utilities_test?schema=public
        run: npx prisma migrate deploy --preview-feature

      - name: Run backend tests
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/ml_utilities_test?schema=public
          JWT_SECRET: test_jwt_secret
          BCRYPT_SALT_ROUNDS: 1
          UPLOAD_DIR: ./uploads-test
          REDIS_URL: redis://localhost:6379 # Not explicitly used by tests here but good practice
        run: npm test -- --coverage --testPathPattern=./tests/

      - name: Upload backend coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: server/coverage/lcov-report

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm install

      - name: Run frontend tests
        working-directory: ./client
        run: npm test

      - name: Upload frontend coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage
          path: client/coverage/lcov-report

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend Docker image
        run: docker build -f Dockerfile.backend -t ml-utilities-backend .

      - name: Build frontend Docker image
        run: docker build -f Dockerfile.frontend -t ml-utilities-frontend .