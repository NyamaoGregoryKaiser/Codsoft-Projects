```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthSystem Frontend</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AuthSystem Demo</h1>

        <div class="auth-section" id="register-section">
            <h2>Register</h2>
            <form id="register-form">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="email" id="register-email" placeholder="Email" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p id="register-message" class="message"></p>
        </div>

        <div class="auth-section" id="login-section">
            <h2>Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-message" class="message"></p>
            <button id="logout-button" style="display: none;">Logout</button>
        </div>

        <div class="auth-section" id="profile-section" style="display: none;">
            <h2>User Profile</h2>
            <p>Welcome, <strong id="profile-username-display"></strong>!</p>
            <div class="profile-details">
                <p><strong>ID:</strong> <span id="profile-id"></span></p>
                <p><strong>Email:</strong> <span id="profile-email"></span></p>
                <p><strong>Created At:</strong> <span id="profile-created-at"></span></p>
                <p><strong>Updated At:</strong> <span id="profile-updated-at"></span></p>
            </div>

            <h3>Update Profile</h3>
            <form id="update-profile-form">
                <input type="text" id="update-username" placeholder="New Username">
                <input type="email" id="update-email" placeholder="New Email">
                <input type="password" id="update-password" placeholder="New Password (min 8 chars, strong)">
                <button type="submit">Update Profile</button>
            </form>
            <p id="profile-message" class="message"></p>
            <button id="delete-profile-button" class="delete-button">Delete My Account</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
```
