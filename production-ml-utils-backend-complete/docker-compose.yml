```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ml_utilities_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose for local development/tools

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db # Link to the database service
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: ml_utilities_db
      NODE_ENV: production # Set to production for prod build
    volumes:
      - ./backend/uploads:/app/uploads # Persist uploaded files
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1 # Direct backend access from frontend container
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
```