```nginx
server {
    listen 80;
    server_name localhost; # or your domain

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Serve specific API calls from Nginx directly if needed,
    # or just ensure they pass through to the backend service.
    # For this setup, frontend calls backend directly.
    # If you want Nginx to act as a reverse proxy for the backend API:
    # location /api/ {
    #     proxy_pass http://backend:5000; # 'backend' is the service name in docker-compose
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
```