```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat_app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chat_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://user:password@db:5432/chat_app?schema=public"
      JWT_SECRET: "your_jwt_secret_key_here"
      JWT_EXPIRES_IN: "1d"
      NODE_ENV: "production" # Or "development" for hot-reloading (requires volume mount)
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Optional: for development, mount src code for hot-reloading
      # - ./backend/src:/app/src
      # - ./backend/prisma:/app/prisma
      # This will override the build output and allow for live code changes
      # If using this for dev, ensure npm install and prisma generate are run locally or in dockerfile
      - /app/node_modules # Important to avoid host node_modules interfering
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/server.js"
    # For development, you might use:
    # command: sh -c "npx prisma migrate dev --name init && npx prisma db seed && npm run dev"


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    environment:
      # These variables are baked into the build, ensure .env.production is correct
      REACT_APP_BACKEND_API_URL: "http://localhost:5000/api" # Use localhost for communication between containers
      REACT_APP_SOCKET_URL: "http://localhost:5000" # Use localhost for communication between containers
      # For production, these would be the public URLs if Nginx isn't proxying
      # REACT_APP_BACKEND_API_URL: "https://api.yourdomain.com/api"
      # REACT_APP_SOCKET_URL: "https://api.yourdomain.com"
    volumes:
      # Optional: for development, mount src code for hot-reloading
      # - ./frontend/src:/app/src
      # - ./frontend/public:/app/public
      # - /app/node_modules # Important to avoid host node_modules interfering
      # This will override the build output and allow for live code changes
      # If using this for dev, you'd run `npm start` locally and not use Nginx.
      # Or adjust Dockerfile to `CMD ["npm", "start"]` and expose 3000.
      # For production, Nginx serves static assets.
      - /app/nginx.conf:/etc/nginx/conf.d/default.conf # Ensure Nginx config is mounted if customized
      
volumes:
  db_data:
```