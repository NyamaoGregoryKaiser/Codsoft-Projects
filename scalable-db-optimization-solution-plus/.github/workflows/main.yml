```yaml
name: OptiDB CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpqxx-dev libssl-dev pkg-config git build-essential postgresql-client

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug # Build with Debug for better test debugging

      - name: Build OptiDB
        run: cmake --build build -j$(nproc)

      - name: Start PostgreSQL for tests
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER optidb_test_user WITH PASSWORD 'optidb_test_password';"
          sudo -u postgres psql -c "CREATE DATABASE optidb_test OWNER optidb_test_user;"
        env:
          PGPASSWORD: optidb_test_password # This is for the `postgres` user initially

      - name: Set up .env for tests
        run: |
          echo "DB_HOST=localhost" > .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=optidb_test" >> .env
          echo "DB_USER=optidb_test_user" >> .env
          echo "DB_PASSWORD=optidb_test_password" >> .env
          echo "JWT_SECRET=test_secret_for_ci" >> .env
          echo "JWT_EXPIRY_SECONDS=360" >> .env
          echo "SERVER_PORT=8080" >> .env # Use a different port to avoid conflicts
          echo "LOG_LEVEL=DEBUG" >> .env
          echo "TARGET_DB_CONN_TIMEOUT_MS=1000" >> .env
          echo "TARGET_DB_MAX_CONN=1" >> .env

      - name: Apply DB Migrations for tests
        working-directory: ./db_migrations
        run: |
          ./apply_migrations.sh
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: optidb_test
          DB_USER: optidb_test_user
          DB_PASSWORD: optidb_test_password

      - name: Run Unit and Integration Tests
        working-directory: build
        run: ./tests/optidb_tests --gtest_output="xml:test_results.xml"
        env:
          # Pass test specific environment variables to the test executable
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: optidb_test
          DB_USER: optidb_test_user
          DB_PASSWORD: optidb_test_password
          JWT_SECRET: test_secret_for_ci
          JWT_EXPIRY_SECONDS: 360
          SERVER_PORT: 8080
          LOG_LEVEL: DEBUG
          TARGET_DB_CONN_TIMEOUT_MS: 1000
          TARGET_DB_MAX_CONN: 1

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: build/test_results.xml

  docker-build:
    needs: build-and-test # Only build Docker image if tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only build and push on main branch pushes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/optidb:latest
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}
```