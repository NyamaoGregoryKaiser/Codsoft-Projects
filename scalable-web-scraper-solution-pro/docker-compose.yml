```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scrapify_db
    environment:
      POSTGRES_DB: ${DB_NAME:-scrapify_db}
      POSTGRES_USER: ${DB_USERNAME:-scrapify_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scrapify_pass}
    ports:
      - "5432:5432"
    volumes:
      - scrapify_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-scrapify_user} -d ${DB_NAME:-scrapify_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scrapify_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-scrapify_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-scrapify_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-scrapify_pass}
      JWT_SECRET: ${JWT_SECRET:-thisisthesecretkeyforjwtauthenticationanditshouldbeverylongandsecureinaproductionenvironment}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      # Other environment variables as needed
    depends_on:
      db:
        condition: service_healthy
    # Optional: Increase memory if scraping consumes a lot
    # mem_limit: 1g
    # mem_reservation: 512m

volumes:
  scrapify_data:
```