```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Caches Maven dependencies

      - name: Build with Maven and run tests
        run: mvn -B package --file pom.xml

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: SonarCloud Scan (Optional, requires setup)
        # Uncomment and configure if you have SonarCloud set up
        # uses: SonarSource/sonarcloud-github-action@master
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
        #   SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # SonarCloud token
        # run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=<YOUR_SONAR_PROJECT_KEY>

  docker-build-and-push:
    needs: build-and-test # Only run if build and tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only push to Docker Hub from 'main' branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/scrapify-webscraper # Your Docker Hub repo
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build-and-push # Only run if Docker image is built and pushed
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy from 'main' branch
    environment: production # Define an environment for deployment (e.g., in GitHub Environments)
    steps:
      - name: Deploy to Server (Example: SSH into a VM and run docker-compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/scrapify-webscraper # Your deployment directory
            docker compose pull
            docker compose down
            docker compose up -d
            echo "Deployment complete for ${{ secrets.DOCKER_USERNAME }}/scrapify-webscraper:latest"
            docker system prune -f # Clean up old images/containers
```