spring:
  application:
    name: auth-system
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Use 'update' in dev, 'validate' in prod for Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.lob.non_contextual_creation: true # Fix for specific Hibernate/PostgreSQL blob issues
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080 # Default server port

jwt:
  secret: ${JWT_SECRET:your_super_secret_key_for_jwt_which_is_at_least_256_bit_long} # CHANGE THIS IN PRODUCTION
  expiration: 18000 # In seconds (5 hours)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true
      default:
        paths-to-match: /api/**

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.authapp: DEBUG # Detailed logging for our application package
    org.hibernate.SQL: DEBUG # Show executed SQL queries
    org.hibernate.orm.jdbc.bind: TRACE # Show SQL parameters

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
```

