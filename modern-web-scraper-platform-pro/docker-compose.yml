```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: web_scraper_db
    environment:
      POSTGRES_USER: ${DB_USER:-scraperuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scraperpassword}
      POSTGRES_DB: ${DB_NAME:-scraperdb}
    volumes:
      - scraper_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass REACT_APP_API_BASE_URL to frontend-builder stage for static site
        # This assumes the combined Dockerfile strategy.
        # If frontend is separate, this arg would be removed from backend build.
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:5000/api/v1}
    container_name: web_scraper_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-scraperuser}
      DB_PASSWORD: ${DB_PASSWORD:-scraperpassword}
      DB_NAME: ${DB_NAME:-scraperdb}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRATION_DAYS: ${JWT_EXPIRATION_DAYS:-7}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000} # Used by CORS
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: always
    # For development, you might mount the source code:
    # volumes:
    #   - ./backend:/app/backend
    #   - /app/backend/node_modules # Avoid overwriting node_modules
    # command: sh -c "npx sequelize-cli db:migrate && node src/server.js" # Run migrations on startup


volumes:
  scraper_db_data:
```