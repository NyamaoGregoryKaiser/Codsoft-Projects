```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # -----------------------------------------------------
  # 1. Backend Build & Test
  # -----------------------------------------------------
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-modules-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-modules-

      - name: Install dependencies
        run: npm install

      - name: Set up PostgreSQL for tests
        uses: harmon758/postgresql-action@v1.0.0
        with:
          postgresql db: pms_test_db
          postgresql user: pms_user
          postgresql password: pms_password

      - name: Run Backend Migrations & Seeders
        env:
          DATABASE_URL: postgres://pms_user:pms_password@localhost:5432/pms_test_db
        run: |
          npm run migrate # Ensure migration CLI is installed, `npx sequelize-cli db:migrate`
          npm run seed    # Seed test data

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgres://pms_user:pms_password@localhost:5432/pms_test_db
          JWT_SECRET: testsecret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: npm test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage

  # -----------------------------------------------------
  # 2. Frontend Build & Test
  # -----------------------------------------------------
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-modules-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-modules-

      - name: Install dependencies
        run: npm install

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false --coverage

      - name: Build Frontend
        run: npm run build
        env:
          REACT_APP_API_URL: /api # Use relative path for Nginx proxy

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  # -----------------------------------------------------
  # 3. Deployment (CD) - example for Render/Heroku/Vercel or custom server
  # This part is highly dependent on your deployment target.
  # For this example, we'll demonstrate pushing Docker images to a registry.
  # -----------------------------------------------------
  docker-push-cd:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci] # Ensure CI passes before attempting CD
    if: github.ref == 'refs/heads/main' # Only deploy from main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pms-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pms-frontend:latest
          build-args: |
            REACT_APP_API_URL=/api # Frontend will use Nginx to proxy /api requests
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server (Optional - Placeholder)
        # This step would typically involve SSHing into a server and running `docker compose pull` and `docker compose up -d`
        # or triggering a deployment on a cloud platform like AWS ECS, Kubernetes, Render, etc.
        # Example using SSH (requires SSH_PRIVATE_KEY and HOST_SERVER_ADDRESS in secrets):
        # - name: Deploy to Production Server
        #   uses: appleboy/ssh-action@master
        #   with:
        #     host: ${{ secrets.HOST_SERVER_ADDRESS }}
        #     username: ${{ secrets.HOST_USERNAME }}
        #     key: ${{ secrets.SSH_PRIVATE_KEY }}
        #     script: |
        #       cd /path/to/your/deployment/directory
        #       docker compose pull
        #       docker compose up -d --remove-orphans
        #       docker image prune -f
        run: echo "Deployment step for production server goes here. E.g., triggering a webhook, or SSHing to pull new images."
```