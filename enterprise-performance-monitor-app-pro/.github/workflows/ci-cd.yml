name: PerfMon CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: perfmonuser_test
          POSTGRES_PASSWORD: perfmonpassword_test
          POSTGRES_DB: perfmondb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Wait for PostgreSQL
        run: |
          for i in `seq 1 10`; do
            pg_isready -h localhost -p 5432 -U perfmonuser_test -d perfmondb_test && break
            echo "Waiting for postgres..."
            sleep 5
          done
        env:
          PGPASSWORD: perfmonpassword_test

      - name: Run migrations
        run: npm run typeorm migration:run -d src/database/data-source.ts -- --environment=test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: perfmonuser_test
          DB_PASSWORD: perfmonpassword_test
          DB_NAME: perfmondb_test
          NODE_ENV: test

      - name: Run backend tests
        run: npm test -- --coverage --testPathPattern=tests/(unit|integration)
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: perfmonuser_test
          DB_PASSWORD: perfmonpassword_test
          DB_NAME: perfmondb_test
          NODE_ENV: test

      - name: Upload backend coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./backend/coverage
          flags: backend

  build-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true # Required for Create React App tests in CI

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          flags: frontend

      - name: Build frontend
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: https://api.perfmon.yourdomain.com/api # Use production backend URL

      - name: Archive frontend build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend] # Ensure tests pass before deployment
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    environment:
      name: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

      # Step 1: Login to Docker Hub or your container registry
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 2: Build and push backend Docker image (if not already built in previous step)
      - name: Build and push backend image
        run: |
          docker build ./backend -t yourdockerhubusername/perfmon-backend:${{ github.sha }}
          docker push yourdockerhubusername/perfmon-backend:${{ github.sha }}

      # Step 3: Build and push frontend Docker image (if not already built in previous step)
      - name: Build and push frontend image
        run: |
          docker build ./frontend -t yourdockerhubusername/perfmon-frontend:${{ github.sha }}
          docker push yourdockerhubusername/perfmon-frontend:${{ github.sha }}

      # Step 4: Deploy to your server via SSH
      # This is a conceptual step. Real deployments might use Ansible, Terraform, Capistrano, etc.
      - name: Deploy to EC2/VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/perfmon_deployment
            # Pull the latest code (if not using images built directly from CI)
            # git pull origin main
            # Update environment variables (e.g., from a secret manager or .env file)
            # docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            # Stop existing containers
            docker-compose -f docker-compose.prod.yml down
            # Pull new images
            docker pull yourdockerhubusername/perfmon-backend:${{ github.sha }}
            docker pull yourdockerhubusername/perfmon-frontend:${{ github.sha }}
            # Update docker-compose file to use new image tags (if not using 'latest')
            # For simplicity, using 'latest' in docker-compose.prod.yml might be okay for small projects
            # OR generate dynamic docker-compose.prod.yml with specific tags here
            
            # Re-run migrations (only if changes) - often handled as a separate deploy step
            # docker-compose -f docker-compose.prod.yml run --rm backend npm run migrate:run

            # Start new containers
            docker-compose -f docker-compose.prod.yml up -d
            echo "Deployment complete for ${{ github.sha }}"

      # Optional: Post-deployment health checks
      # - name: Run Post-deployment Health Check
      #   run: curl -f http://perfmon.yourdomain.com/health || exit 1
```

**GitHub Secrets needed for `deploy` job**:
*   `DOCKER_USERNAME`, `DOCKER_PASSWORD`: Credentials for your Docker Hub or container registry.
*   `SSH_HOST`: IP address or hostname of your deployment server.
*   `SSH_USERNAME`: SSH user on your deployment server.
*   `SSH_PRIVATE_KEY`: SSH private key to authenticate to the server.

This CI/CD pipeline ensures that every push to `main` (or a pull request) is built, tested, and if successful, deployed to your production environment.

