version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-perfmonuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-perfmonpassword}
      POSTGRES_DB: ${DB_NAME:-perfmondb}
    ports:
      - "5432:5432" # Expose for local development/debugging
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck: # Ensure database is ready before starting other services
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-perfmonuser} -d ${DB_NAME:-perfmondb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-perfmonuser}
      DB_PASSWORD: ${DB_PASSWORD:-perfmonpassword}
      DB_NAME: ${DB_NAME:-perfmondb}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      API_KEY_SECRET: ${API_KEY_SECRET:-supersecretapikey}
      CACHE_TTL: ${CACHE_TTL:-300}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      PERF_DATA_RATE_LIMIT_MAX_REQUESTS: ${PERF_DATA_RATE_LIMIT_MAX_REQUESTS:-1000}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/backend/logs # Mount logs directory for persistence
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be healthy
    command: ["sh", "-c", "npm run migrate:run && npm start"] # Run migrations then start
    # For CI/CD, migration is often a separate step before deploying the app.
    # For dev, you might just use `npm run dev` locally and `npm run migrate:run` once.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api # Adjust for production environment
    ports:
      - "3000:80" # Map host port 3000 to Nginx port 80
    depends_on:
      - backend

volumes:
  pgdata: # Named volume for PostgreSQL data persistence
```

---

### **4. Testing & Quality**

*   **Unit tests (aim for 80%+ coverage)**:
    *   **Backend**: Jest. Test individual functions, services, and utilities in isolation. Mock database interactions and external dependencies.
    *   **Frontend**: Jest and React Testing Library. Test individual components (rendering, user interaction, props), custom hooks, and utility functions.
*   **Integration tests**:
    *   **Backend**: Jest with Supertest. Test the interaction between controllers, services, and a *test database*. These tests verify that different layers of your application work correctly together. Use a separate test database or transactions to ensure tests are isolated.
*   **API tests**:
    *   Can be an extension of integration tests using Supertest to hit actual Express routes.
    *   Can also be external: Postman/Newman collections or tools like Cypress for end-to-end API interaction.
*   **Performance tests**:
    *   **Backend**: k6 for load testing API endpoints. Simulate many concurrent users sending performance data to the `/performance/metrics` endpoint, and also hitting reporting endpoints. Measure throughput, latency, error rates.
    *   **Frontend**: Lighthouse CI integrated into the CI/CD pipeline to analyze page load performance, accessibility, SEO, and best practices for critical user flows (e.g., dashboard load, page details view).

