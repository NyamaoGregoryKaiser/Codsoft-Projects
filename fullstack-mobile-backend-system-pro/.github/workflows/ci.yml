name: Django CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install psycopg2-binary for database connection
        pip install psycopg2-binary
        # Install black for linting
        pip install black flake8

    - name: Create .env file for testing
      run: |
        cp .env.example .env
        sed -i "s|DEBUG=True|DEBUG=False|g" .env
        sed -i "s|DATABASE_URL=sqlite:///db.sqlite3|DATABASE_URL=postgres://user:password@localhost:5432/test_db|g" .env
        sed -i "s|REDIS_URL=redis://redis:6379/1|REDIS_URL=redis://localhost:6379/1|g" .env
        sed -i "s|CELERY_BROKER_URL=redis://redis:6379/0|CELERY_BROKER_URL=redis://localhost:6379/0|g" .env
        sed -i "s|CELERY_RESULT_BACKEND=redis://redis:6379/0|CELERY_RESULT_BACKEND=redis://localhost:6379/0|g" .env
        echo "SECRET_KEY=$(head /dev/urandom | tr -dc A-Za-z0-9_ | head -c 50)" >> .env

    - name: Set up PostgreSQL for tests
      uses: Harmonize-Inc/postgresql-action@v1.1.0
      with:
        postgresql version: '15'
        postgresql db: 'test_db'
        postgresql user: 'user'
        postgresql password: 'password'

    - name: Set up Redis for tests
      uses: supercharge/redis-github-action@1.7.0
      with:
        redis-version: '7'

    - name: Run Black linter
      run: black --check .

    - name: Run Flake8 linter
      run: flake8 .

    - name: Run Django Migrations (for tests)
      run: python manage.py migrate

    - name: Run tests with coverage
      run: |
        coverage run --source='.' manage.py test --settings=config.settings
        coverage report --fail-under=80 # Fail if coverage is below 80%

    # Optional: Docker build and push (e.g., to GitHub Container Registry)
    # This section would typically be in a separate CD workflow or a deploy job
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v2
