name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend_build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Run Backend Unit Tests
        run: npm test -- --coverage --coverageDirectory=../coverage/backend-unit
        working-directory: ./backend

      - name: Setup PostgreSQL for E2E tests
        uses: ankane/setup-postgres@v1
        with:
          postgres-version: 15
          database: test_db
          username: testuser
          password: testpassword

      - name: Wait for PostgreSQL to be ready
        run: |
          dockerize -wait tcp://localhost:5432 -timeout 1m

      - name: Create .env.test for Backend E2E
        run: |
          echo "JWT_SECRET=${{ secrets.JWT_SECRET_TEST }}" > backend/.env.test
          echo "DATABASE_HOST=localhost" >> backend/.env.test
          echo "DATABASE_PORT=5432" >> backend/.env.test
          echo "DATABASE_USERNAME=testuser" >> backend/.env.test
          echo "DATABASE_PASSWORD=testpassword" >> backend/.env.test
          echo "DATABASE_NAME=test_db" >> backend/.env.test
          echo "REDIS_HOST=localhost" >> backend/.env.test # Even if not using Redis for E2E, the config expects it
          echo "REDIS_PORT=6379" >> backend/.env.test
          echo "THROTTLER_TTL=1" >> backend/.env.test # Low TTL for rate limit test
          echo "THROTTLER_LIMIT=2" >> backend/.env.test # Low limit for rate limit test

      - name: Run Backend E2E Tests
        run: npm run test:e2e
        working-directory: ./backend

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: coverage/backend-unit
          retention-days: 7 # Keep coverage reports for 7 days

  frontend_build_and_test:
    runs-on: ubuntu-latest
    needs: backend_build_and_test # Frontend tests can run in parallel, but can also depend on backend for full integration test setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run Frontend Tests
        run: npm run test:ci -- --coverage --coverageDirectory=../coverage/frontend
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: coverage/frontend
          retention-days: 7

