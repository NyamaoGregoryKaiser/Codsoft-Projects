[alembic]
# Path to migration scripts
script_location = alembic
# Python path where the Alembic environment is configured
# (e.g., env.py, and where your models are)
# This usually refers to the root of your Python package.
# Assuming your app entry point is `app/main.py` and models are in `app/models`.
# Change this if your actual Python package structure is different.
# For poetry, assuming `app` is the package root and alembic env.py needs to import from it.
# We'll set this dynamically in env.py to ensure `app` is in path.

# Which target autogenerate should compare to
# The current directory is usually fine as long as `alembic/env.py` can import your models.
# Make sure to run alembic commands from the project root (where alembic.ini is).
# For example, `alembic revision --autogenerate -m "initial migration"`

sqlalchemy.url = postgresql+asyncpg://postgres:password@db:5432/task_db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S