```yaml
name: CI/CD Pipeline for DataViz System

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_data_viz_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5433:5432 # Map to a different port to avoid conflict
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Backend dependencies
      run: npm install
      working-directory: ./server

    - name: Set up Backend .env for tests
      run: |
        echo "NODE_ENV=test" >> ./server/.env
        echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5433/test_data_viz_db" >> ./server/.env
        echo "JWT_SECRET=test_jwt_secret" >> ./server/.env
        echo "JWT_EXPIRES_IN=1h" >> ./server/.env
        echo "REFRESH_TOKEN_SECRET=test_refresh_secret" >> ./server/.env
        echo "REFRESH_TOKEN_EXPIRES_IN=7d" >> ./server/.env
        echo "ENABLE_CACHE=false" >> ./server/.env
        echo "RATE_LIMIT_WINDOW=1" >> ./server/.env
        echo "RATE_LIMIT_MAX_REQUESTS=10" >> ./server/.env
        echo "FRONTEND_URL=http://localhost:3000" >> ./server/.env

    - name: Run TypeORM Migrations
      run: npm run migration:run
      working-directory: ./server
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5433/test_data_viz_db

    - name: Run Backend Tests
      run: npm test
      working-directory: ./server
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5433/test_data_viz_db # Ensure tests use the correct DB URL

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage-report
        path: server/coverage/lcov.info


  build-and-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Frontend dependencies
      run: npm install
      working-directory: ./client

    - name: Run Frontend Tests
      run: npm test -- --coverage --watchAll=false
      working-directory: ./client
      env:
        CI: true # Required for create-react-app to run tests in CI

    - name: Build Frontend for production
      run: npm run build
      working-directory: ./client

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage-report
        path: client/coverage/lcov.info

    - name: Upload Frontend build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: client/build


