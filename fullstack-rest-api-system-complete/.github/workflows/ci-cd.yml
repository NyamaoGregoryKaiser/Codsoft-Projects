name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend_ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Set up PostgreSQL for tests
        run: |
          docker run --name test-db -e POSTGRES_USER=${{ secrets.DB_USER }} -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} -e POSTGRES_DB=${{ secrets.DB_TEST_NAME }} -p 5432:5432 -d postgres:15-alpine
          docker cp ./docker-entrypoint-initdb.d/init-uuid.sh test-db:/docker-entrypoint-initdb.d/init-uuid.sh
          docker exec test-db bash /docker-entrypoint-initdb.d/init-uuid.sh
          echo "Waiting for PostgreSQL to be ready..."
          sleep 10 # Give PostgreSQL time to start and create extension
          npm run db:migrate -- -d ormconfig.ts # Run migrations against the test database
        env:
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_TEST_NAME: horizon_pms_ci_db

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_TEST_NAME: horizon_pms_ci_db
          SECRET_KEY: ci_secret_key
          REFRESH_SECRET_KEY: ci_refresh_secret_key
          REDIS_HOST: localhost # Not used for current tests, but good practice
          REDIS_PORT: 6379

      - name: Stop and remove PostgreSQL container
        if: always()
        run: docker stop test-db && docker rm test-db

  frontend_ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run frontend tests
        run: npm test -- --watchAll=false # Run tests once without watch mode
        env:
          CI: true # Required for Create React App tests in CI

  # Deployment job (optional, simplified for demonstration)
  # This part would typically involve deploying to a cloud provider like AWS, GCP, Azure, etc.
  # For this example, we'll just demonstrate building Docker images.
  deploy:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend_ci, frontend_ci]
    if: github.ref == 'refs/heads/main' # Only deploy on push to main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: yourdockerhubusername/horizon-pms-backend:latest
          target: production # Build production stage

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          tags: yourdockerhubusername/horizon-pms-frontend:latest
          target: production # Build production stage

      # Add steps here for actual deployment to a server, Kubernetes, etc.
      # For example:
      # - name: Deploy to EKS/ECS
      #   run: |
      #     aws eks update-kubeconfig --name your-cluster-name --region your-region
      #     kubectl apply -f k8s/backend-deployment.yaml
      #     kubectl apply -f k8s/frontend-deployment.yaml
```

