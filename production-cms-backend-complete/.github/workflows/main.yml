name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Wait for Postgres to be ready
        run: |
          for i in `seq 1 10`; do
            pg_isready -h localhost -p 5432 -U testuser && break
            sleep 5
          done
          pg_isready -h localhost -p 5432 -U testuser
      
      - name: Run database migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: testuser
          DB_PASSWORD: testpassword
          DB_DATABASE: testdb
        run: npm run migrate:run

      - name: Run backend tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: testuser
          DB_PASSWORD: testpassword
          DB_DATABASE: testdb
          JWT_SECRET: testsecret
        run: npm test

      - name: Build backend Docker image (optional for CI, required for CD)
        run: docker build -t cms-backend:latest .

  build-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test -- --coverage # Run tests with coverage

      - name: Build frontend
        run: npm run build

      - name: Build frontend Docker image (optional for CI, required for CD)
        run: docker build -t cms-frontend:latest .

  deploy:
    if: github.ref == 'refs/heads/main' # Only deploy on push to main branch
    needs: [build-and-test-backend, build-and-test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (or other registry)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: yourdockerhubusername/cms-backend:latest
          build-args: |
            NODE_ENV=production

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: yourdockerhubusername/cms-frontend:latest
          build-args: |
            REACT_APP_API_BASE_URL=http://your.production.backend.url/api/v1 # IMPORTANT: Change this for production
      
      - name: Deploy to Server (e.g., using SSH)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/deployment/directory
            # Pull latest docker-compose.yml and .env if they are separate
            # For simplicity, assuming current docker-compose handles images
            docker compose pull
            docker compose down
            docker compose up -d
            docker system prune -f # Clean up old images/volumes
```
*(Note: Replace `yourdockerhubusername` and `your.production.backend.url` with actual values. Secrets for Docker Hub and SSH would be configured in GitHub repository settings.)*

