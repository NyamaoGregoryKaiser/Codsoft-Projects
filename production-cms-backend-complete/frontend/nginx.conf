server {
  listen 80;
  server_name localhost; # Replace with your domain in production

  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Add any other specific configurations, e.g., for API proxy if needed.
  # For this setup, frontend directly calls backend using REACT_APP_API_BASE_URL
  # which assumes backend is accessible at that URL from the browser.
  # If running behind a single proxy, you might proxy API calls from Nginx here:
  # location /api {
  #   proxy_pass http://backend:5000; # 'backend' is the service name in docker-compose
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }
}