version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: payment_processor_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payment_processor_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: payment_processor_app
    command: sh -c "alembic upgrade head && python seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs # Mount logs directory for persistence
      - ./seed_data.py:/app/seed_data.py
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  celery_worker:
    build: .
    container_name: payment_processor_celery_worker
    command: celery -A app.tasks.payment_tasks:celery_app worker --loglevel=info --pool=solo --concurrency=1 # Use solo pool for simpler async task handling in dev
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  # frontend:
  #   build: ./frontend # Assuming your frontend has its own Dockerfile
  #   container_name: payment_processor_frontend
  #   ports:
  #     - "3000:3000" # Or whatever port your React app runs on
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules # Avoid overwriting node_modules
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000/api/v1 # Or the service name if accessed internally
  #   depends_on:
  #     - app

volumes:
  postgres_data: {}
  # You might want a named volume for Redis data too if persistence is crucial
  # redis_data: {}

```

