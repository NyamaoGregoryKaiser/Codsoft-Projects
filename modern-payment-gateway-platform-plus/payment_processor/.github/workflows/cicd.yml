name: Payment Processor CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/cicd.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/cicd.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Flake8
      run: |
        flake8 app --max-line-length=120 --exclude=alembic,migrations

    - name: Format with Black (Check Only)
      run: |
        black app --check

    - name: Sort imports with Isort (Check Only)
      run: |
        isort app --check-only

    - name: Type check with MyPy
      run: |
        mypy app

    - name: Set up Docker Compose for testing
      run: |
        docker-compose -f docker-compose.test.yml up -d --build
        # Wait for services to be healthy
        sleep 10 # Initial wait for containers to start
        docker-compose -f docker-compose.test.yml ps
        docker-compose -f docker-compose.test.yml logs db # Debug DB startup
        docker-compose -f docker-compose.test.yml logs redis # Debug Redis startup
        # More robust health checks if needed

    - name: Run Database Migrations (for testing DB)
      # This assumes your Dockerfile or entrypoint handles migrations,
      # but explicitly running it here ensures the test DB is ready.
      # Make sure the test DB URL is correctly configured for the test environment.
      run: |
        docker exec payment_processor_test_app alembic upgrade head
      env:
        # Override DB for tests
        POSTGRES_DB: ${{ env.POSTGRES_TEST_DB }}
        # Other test env vars if needed
        # REDIS_URL: redis://test_redis:6379/0 # if test redis is separate

    - name: Run Python tests
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing tests/
      env:
        SECRET_KEY: test_secret_key # Use a test secret key
        POSTGRES_SERVER: db_test
        POSTGRES_DB: ${POSTGRES_TEST_DB}
        REDIS_SERVER: redis_test
        CELERY_BROKER_URL: redis://redis_test:6379/1
        CELERY_RESULT_BACKEND: redis://redis_test:6379/2
        # Ensure these match the docker-compose.test.yml service names if different
        # Or use actual hostnames 'localhost' if running on host network

    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: true # Set to true to fail CI if Codecov upload fails

    - name: Tear down Docker Compose
      if: always()
      run: docker-compose -f docker-compose.test.yml down

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    runs-on: ubuntu-latest
    environment: production # Use GitHub environments for secrets
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/payment-processor:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Production (Example: SSH to server and run docker-compose pull/up)
      # This is a placeholder. Real deployment would use tools like Ansible, Terraform, Kubernetes, etc.
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        script: |
          cd /path/to/your/app/on/server
          docker-compose pull
          docker-compose up -d --remove-orphans
          docker image prune -f # Clean up old images

```

*(`docker-compose.test.yml` would be similar to `docker-compose.yml` but specifically configured for an isolated test environment, perhaps with separate database/redis instances or in-memory ones for unit tests.)*

