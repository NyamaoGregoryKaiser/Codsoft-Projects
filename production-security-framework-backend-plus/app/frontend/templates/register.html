```html
{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="starter-template">
    <h1>Register</h1>
    <p class="lead">Create a new account.</p>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="POST" action="{{ url_for('frontend.register') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required value="{{ username if username }}">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" required value="{{ email if email }}">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-success">Register</button>
            </form>
            <p class="mt-3">Already have an account? <a href="{{ url_for('frontend.login') }}">Login here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
```
