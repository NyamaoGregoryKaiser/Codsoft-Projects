```html
{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="starter-template">
    <h1>Login</h1>
    <p class="lead">Please enter your credentials to log in.</p>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="POST" action="{{ url_for('frontend.login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" required value="{{ email if email }}">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <p class="mt-3">Don't have an account? <a href="{{ url_for('frontend.register') }}">Register here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
```
