[alembic]
script_location = backend/migrations
prepend_sys_path = .

sqlalchemy.url = postgresql+psycopg2://user:password@db:5432/task_db # Will be overwritten by env.py

# logging configuration
[loggers]
keys = root, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S