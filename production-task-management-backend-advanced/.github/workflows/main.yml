name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
        working-directory: ./backend

      - name: Set up .env for tests
        run: |
          cp backend/.env.example backend/.env
          # Override with dummy test values if necessary
          echo "POSTGRES_SERVER=localhost" >> backend/.env
          echo "POSTGRES_USER=testuser" >> backend/.env
          echo "POSTGRES_PASSWORD=testpassword" >> backend/.env
          echo "POSTGRES_DB=testdb" >> backend/.env
          echo "REDIS_HOST=localhost" >> backend/.env
          echo "REDIS_PORT=6379" >> backend/.env
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY_TEST || 'test-secret-key' }} # Use secrets for prod, fallback for test
          FIRST_SUPERUSER_EMAIL: testadmin@example.com
          FIRST_SUPERUSER_PASSWORD: testpassword

      - name: Run backend tests
        run: pytest --cov=app --cov-report=xml --cov-fail-under=80 backend/tests/
        working-directory: ./
        env:
          # Ensure test environment variables are available to pytest
          POSTGRES_SERVER: localhost
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY: ${{ secrets.SECRET_KEY_TEST || 'test-secret-key' }}
          FIRST_SUPERUSER_EMAIL: testadmin@example.com
          FIRST_SUPERUSER_PASSWORD: testpassword
          DEBUG: True # Enable debug for more verbose test logs
          # Add any other required backend env vars for testing

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          verbose: true

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test -- --coverage --watchAll=false # Ensure tests run once and exit
        working-directory: ./frontend
        env:
          CI: true # Required for create-react-app to run tests in CI environment

  # Optional: Deploy job (example for main branch push)
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production # Link to a GitHub environment for secrets management
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          docker-compose build --file docker-compose.prod.yml
          docker tag task-management-system-backend:latest your_docker_username/task-management-backend:${{ github.sha }}
          docker tag task-management-system-frontend:latest your_docker_username/task-management-frontend:${{ github.sha }}
          docker push your_docker_username/task-management-backend:${{ github.sha }}
          docker push your_docker_username/task-management-frontend:${{ github.sha }}
          docker tag task-management-system-backend:latest your_docker_username/task-management-backend:latest
          docker tag task-management-system-frontend:latest your_docker_username/task-management-frontend:latest
          docker push your_docker_username/task-management-backend:latest
          docker push your_docker_username/task-management-frontend:latest
        env:
          # Production environment variables here
          POSTGRES_SERVER: ${{ secrets.PROD_DB_HOST }}
          POSTGRES_USER: ${{ secrets.PROD_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.PROD_DB_NAME }}
          SECRET_KEY: ${{ secrets.PROD_SECRET_KEY }}
          REDIS_HOST: ${{ secrets.PROD_REDIS_HOST }}
          REDIS_PORT: ${{ secrets.PROD_REDIS_PORT }}
          FIRST_SUPERUSER_EMAIL: ${{ secrets.PROD_ADMIN_EMAIL }}
          FIRST_SUPERUSER_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
          DEBUG: False
          REACT_APP_API_BASE_URL: ${{ secrets.PROD_API_URL }}
        # Note: docker-compose.prod.yml would have production settings, e.g., explicit image names
        # and more robust container restart policies, persistent volumes for Redis/DB.

      - name: Deploy to Server (e.g., SSH, Kubernetes, AWS ECS/EKS)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/deployment
            # Pull the new images (or update K8s deployment)
            # Apply database migrations
            # Restart services
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            # Run migrations (example, actual command may vary)
            docker exec <backend-container-name> alembic upgrade head
            echo "Deployment completed!"