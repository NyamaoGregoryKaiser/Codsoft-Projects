```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "NODE_ENV=test" >> .env
          echo "DATABASE_URL=${{ secrets.TEST_DATABASE_URL }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_EXPIRES_IN=1h" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "RATE_LIMIT_WINDOW_MS=1000" >> .env
          echo "RATE_LIMIT_MAX_REQUESTS=5" >> .env
          cat .env # For debugging

      - name: Start PostgreSQL (for integration/API tests)
        if: success() # Only if .env creation was successful
        uses: harmon7/postgresql-action@v1.0.0
        with:
          postgresql-version: '15'
          postgresql-user: 'testuser'
          postgresql-password: 'testpassword'
          postgresql-database: 'testdb'
          port: 5432 # Default port

      - name: Run Prisma Migrations
        if: success()
        run: npx prisma migrate deploy # Apply migrations to the test DB
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        continue-on-error: true # Allow subsequent steps to run even if migration fails for some reason

      - name: Run Unit & Integration Tests
        run: npm test

      - name: Run API Tests
        run: npm run test:api
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }} # Ensure API tests use the same test DB
        
      - name: Lint Backend Code
        run: npm run lint

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          directory: ./backend/coverage # Point to the backend coverage folder

  build-and-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "REACT_APP_API_URL=http://localhost:5000/api" >> .env
          cat .env # For debugging

      - name: Run Frontend Tests
        run: npm test -- --coverage --watchAll=false # Run tests once with coverage

      - name: Lint Frontend Code
        run: npm run lint

      - name: Build Frontend
        run: npm run build
        env:
          CI: true # Treats warnings as errors in CI

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage # Point to the frontend coverage folder

  # Example Deployment Job (e.g., to Docker Hub / Railway / Render)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend] # Ensure all tests pass before deployment
    if: github.ref == 'refs/heads/main' # Only deploy from 'main' branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/task-management-backend:latest
          build-args: |
            DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }} # Use prod DB for client generation

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/task-management-frontend:latest
          build-args: |
            REACT_APP_API_URL=${{ secrets.PRODUCTION_API_URL }}

      # Example for deploying to a cloud provider like Railway, Render, or self-hosted server
      # - name: Deploy to Railway (example)
      #   uses: railwayapp/cli-action@v1
      #   if: success()
      #   with:
      #     token: ${{ secrets.RAILWAY_TOKEN }}
      #     command: railway deploy --service backend-service-name
