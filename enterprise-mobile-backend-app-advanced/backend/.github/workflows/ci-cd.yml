name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Use test specific database URL for CI environment
      DATABASE_URL_TEST: postgresql://user:password@localhost:5433/testdb?schema=public
      REDIS_URL_TEST: redis://localhost:6380
      JWT_SECRET: ci-secret-key # Use a simple secret for CI
      NODE_ENV: test # Ensure test environment
      # Define other environment variables required for tests
      LOG_LEVEL: error # Keep logs minimal during CI

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5433:5432 # Map to a different port for CI
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379 # Map to a different port for CI
        options: >-
          --health-cmd redis-cli ping
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Cache Prisma Client
        uses: actions/cache@v4
        with:
          path: ./backend/node_modules/.prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('**/backend/prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in `seq 1 10`; do
            nc -z localhost 5433 && break
            echo "Waiting for PostgreSQL..."
            sleep 5
          done
          sleep 5 # Give it a few more seconds
      
      - name: Wait for Redis to be ready
        run: |
          for i in `seq 1 10`; do
            nc -z localhost 6380 && break
            echo "Waiting for Redis..."
            sleep 5
          done
          sleep 5 # Give it a few more seconds

      - name: Run tests (Unit & Integration)
        working-directory: ./backend
        run: npm run test:coverage # This will also run migrations and seed data via setup.ts

      - name: Build Docker image
        working-directory: ./backend
        run: docker build -t mobile-app-backend-image .

      - name: Display Docker image size
        run: docker images mobile-app-backend-image

