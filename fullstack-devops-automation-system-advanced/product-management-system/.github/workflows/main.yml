name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install
      - name: Run Backend Lint
        run: |
          cd backend
          npm run lint
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --force # --force might be needed for CI environments with specific React-scripts versions
      - name: Run Frontend Lint
        run: |
          cd frontend
          npm run lint

  backend_build_test:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: |
          cd backend
          npm install
      - name: Set up Test Database (PostgreSQL)
        run: |
          docker run --name test-db -e POSTGRES_DB=testdb -e POSTGRES_USER=testuser -e POSTGRES_PASSWORD=testpassword -p 5432:5432 -d postgres:15-alpine
          sleep 10 # Give PostgreSQL time to start
      - name: Run Migrations and Seed Test Data
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: testdb
          JWT_SECRET: ci-test-secret
          JWT_EXPIRATION_DAYS: 1h
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test # Ensure test environment settings are used
        run: |
          cd backend
          npx sequelize-cli db:migrate --env test # Use a test environment config for migrations
          npx sequelize-cli db:seed:all --env test # Use a test environment config for seeding
      - name: Run Backend Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: testdb
          JWT_SECRET: ci-test-secret
          JWT_EXPIRATION_DAYS: 1h
          REDIS_HOST: localhost # Not truly running Redis for CI, but mocks will handle this
          REDIS_PORT: 6379
          NODE_ENV: test
        run: |
          cd backend
          npm test -- --coverage
      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage

  frontend_build_test:
    name: Frontend Build and Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: |
          cd frontend
          npm install --force
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false
      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  docker_build_push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [backend_build_test, frontend_build_test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only push on main branch commits
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/product-management-backend:latest
          build-args: |
            NODE_ENV=production
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/product-management-frontend:latest
          build-args: |
            REACT_APP_API_BASE_URL=http://your-production-backend-url/api/v1 # IMPORTANT: Update this for your production environment
```

