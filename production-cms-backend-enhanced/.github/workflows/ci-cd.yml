name: Java Spring Boot CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml -DskipTests

      - name: Run Unit and Integration Tests
        run: mvn -B test jacoco:report --file pom.xml

      - name: Check JaCoCo Coverage Report
        run: mvn jacoco:check --file pom.xml # This will fail the build if coverage rules are not met

      - name: Archive JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Build Docker image
        run: docker build -t cms-system:${{ github.sha }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

      - name: Push Docker image
        run: |
          docker tag cms-system:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cms-system:latest
          docker tag cms-system:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cms-system:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/cms-system:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cms-system:${{ github.sha }}
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production # Define a production environment in GitHub settings
    steps:
      - name: Deploy to Server (Example: SSH to remote server and run docker compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/cms-deployment # Change to your deployment directory
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker-compose pull # Pull the latest image
            docker-compose down # Stop existing containers
            docker-compose up -d # Start new containers
            docker image prune -f # Clean up old images
```
**GitHub Secrets Required:**
*   `DOCKER_USERNAME`
*   `DOCKER_PASSWORD`
*   `SSH_HOST`
*   `SSH_USERNAME`
*   `SSH_PRIVATE_KEY`

