version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appinsight_db
    ports:
      - "5432:5432"
    volumes:
      - appinsight_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d appinsight_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - appinsight_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/appinsight_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretjwtkey # Use strong, unique secret in production
      PORT: 5000
      NODE_ENV: production
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      API_KEY_HEADER: X-AppInsight-Api-Key
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount backend for development, but for production use a build image
      - /app/node_modules # Exclude node_modules from host mount
    command: sh -c "npx prisma migrate deploy && npm run start" # Apply migrations then start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://backend:5000/api # Use internal Docker service name
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app # Mount frontend for development, but for production use a build image
      - /app/node_modules # Exclude node_modules from host mount

volumes:
  appinsight_db_data:
  appinsight_redis_data: