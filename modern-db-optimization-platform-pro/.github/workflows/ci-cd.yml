```yaml
name: CI/CD Pipeline for DB Optimizer

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Setup PostgreSQL for Testing
        uses: harmon758/postgresql-action@v1.0.0
        with:
          postgresql db: dboptimizer_test_db
          postgresql user: pguser
          postgresql password: pgpassword

      - name: Wait for PostgreSQL to be ready
        run: |
          npm install pg # Install pg client for health check
          until pg_isready -h localhost -p 5432 -U pguser -d dboptimizer_test_db; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          echo "PostgreSQL is ready!"
        env:
          PGPASSWORD: pgpassword

      - name: Run Backend Tests
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          # Use the PostgreSQL from the action directly
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: pguser
          DB_PASSWORD: pgpassword
          DB_DATABASE: dboptimizer_test_db
          # Mock Redis or configure a local one for tests if needed
          REDIS_HOST: localhost
          REDIS_PORT: 6379 # Assuming Redis is mocked or not critical for unit/integration tests

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: ./backend/coverage/

  build-and-test-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Frontend Tests
        run: npm test -- --coverage --watchAll=false # --watchAll=false to run tests once in CI

      - name: Build Frontend
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: /api # For CI build, relative path or a dummy value

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: ./frontend/build/

  # This job would typically run after successful builds and tests on 'main' branch
  # It assumes you have a Docker registry (e.g., Docker Hub) configured
  deploy:
    name: Deploy to Docker Registry
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend] # Only deploy if tests pass
    if: github.ref == 'refs/heads/main' # Only deploy from main branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: yourdockerhubusername/dboptimizer-backend:latest
          build-args: |
            NODE_ENV=production

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: yourdockerhubusername/dboptimizer-frontend:latest
          build-args: |
            REACT_APP_API_BASE_URL=${{ secrets.PROD_API_BASE_URL }} # Pass production API URL

      - name: Deploy to Server (Conceptual - e.g., SSH and run docker-compose pull/up)
        # This step would typically involve SSHing into your server and pulling the new images
        # and restarting your docker-compose services.
        run: |
          echo "Simulating deployment to production server..."
          echo "Connect via SSH to your server and run 'docker-compose pull && docker-compose up -d'"
          # Example using ssh-action (requires SSH_PRIVATE_KEY secret)
          # uses: appleboy/ssh-action@master
          # with:
          #   host: ${{ secrets.SSH_HOST }}
          #   username: ${{ secrets.SSH_USERNAME }}
          #   key: ${{ secrets.SSH_PRIVATE_KEY }}
          #   script: |
          #     cd /path/to/your/app
          #     docker-compose pull
          #     docker-compose up -d --remove-orphans
          #     docker system prune -f
