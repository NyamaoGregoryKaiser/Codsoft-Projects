```yaml
version: '3.8'

services:
  postgres_app_db:
    image: postgres:14-alpine
    container_name: dboptimizer_app_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-dboptimizer_app_db}
      POSTGRES_USER: ${DB_USERNAME:-pguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pgpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pguser} -d ${DB_DATABASE:-dboptimizer_app_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: dboptimizer_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dboptimizer_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      DB_HOST: postgres_app_db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-pguser}
      DB_PASSWORD: ${DB_PASSWORD:-pgpassword}
      DB_DATABASE: ${DB_DATABASE:-dboptimizer_app_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-} # If you set a password for Redis
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminpassword}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      postgres_app_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npm run migrate:run && npm run seed:run && npm run start"
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevent host node_modules from overwriting container's

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dboptimizer_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api # Use backend service name for internal Docker network, but localhost for host machine access. For production, this should be the public URL of your backend.
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent host node_modules from overwriting container's

volumes:
  postgres_app_data:
  redis_data:
```