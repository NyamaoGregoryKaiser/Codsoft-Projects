version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cms_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-cmsuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cmspassword}
      POSTGRES_DB: ${DB_DATABASE:-cms_db}
    ports:
      - "5432:5432" # Expose for local development/tools
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    ports:
      - "6379:6379" # Expose for local development/tools
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000} # Or http://localhost for Nginx if proxying
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-cmsuser}
      DB_PASSWORD: ${DB_PASSWORD:-cmspassword}
      DB_DATABASE: ${DB_DATABASE:-cms_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-anothersupersecretjwtkey}
      JWT_REFPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL_SECONDS: ${REDIS_TTL_SECONDS:-3600}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs # Store logs inside container
    volumes:
      - ./backend/logs:/app/logs # Persist logs on host
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms_frontend
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx default)
    environment:
      # These are build-time variables for React, prefixed with REACT_APP_
      # They are copied into the static build.
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
  redis_data:
```

