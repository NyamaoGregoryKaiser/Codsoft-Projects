server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Serve assets with longer cache control
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        log_not_found off;
    }

    # Optional: Proxy API requests if running directly from Nginx and not a separate frontend container
    # For this setup, the frontend container directly calls the backend service.
    # If running with a single Nginx proxy, uncomment and adjust:
    # location /api {
    #     proxy_pass http://backend:3000; # 'backend' is the name of the backend service in docker-compose
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
