name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Set up Docker Compose
        run: docker-compose -f docker-compose.test.yml up -d db

      - name: Wait for PostgreSQL to be ready
        run: |
          docker-compose -f docker-compose.test.yml exec db sh -c 'until pg_isready -U user -d pms_db; do sleep 1; done'

      - name: Run Backend Migrations and Seeds
        working-directory: ./backend
        run: |
          npm run migration:run
          npm run seed

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test -- --coverage

      - name: Archive Test Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage

      - name: Stop Docker Compose services
        if: always()
        run: docker-compose -f docker-compose.test.yml down

  frontend-build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Frontend Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build Frontend Application
        working-directory: ./frontend
        run: npm run build

      - name: Archive Frontend Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist

  # Placeholder for Deployment - This job would typically involve building Docker images
  # and deploying them to a container registry and then to a cloud provider.
  # This example assumes Docker Hub for images and a generic deploy step.
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build-and-lint] # Ensure tests and builds pass
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: yourdockerusername/pms-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: yourdockerusername/pms-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Production (Example: SSH to server and run docker compose pull/up)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          ssh -i deploy_key.pem -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'EOF'
            cd /path/to/your/app
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f # Clean up old images
          EOF
```

