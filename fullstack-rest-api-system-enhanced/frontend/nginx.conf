server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Example of proxying API calls through Nginx (optional, can be direct from React)
  # If you want to use this, change REACT_APP_API_BASE_URL to /api/v1 in frontend .env
  # location /api/v1/ {
  #   proxy_pass http://backend:5000/api/v1/; # 'backend' is the service name in docker-compose
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }
}