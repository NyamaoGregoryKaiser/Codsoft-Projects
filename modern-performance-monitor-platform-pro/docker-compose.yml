version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: synapse_sense_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d synapse_sense_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      FLASK_APP: app
      FLASK_ENV: production # or development
      DATABASE_URL: postgresql://user:password@db:5432/synapse_sense_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY} # Define in .env or your deployment secret management
      # Other environment variables from .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: gunicorn -w 4 -b 0.0.0.0:5000 "app:create_app()" # Use gunicorn to run the app

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    environment:
      FLASK_APP: app
      FLASK_ENV: production
      DATABASE_URL: postgresql://user:password@db:5432/synapse_sense_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.worker # Run the worker script

volumes:
  pgdata:
