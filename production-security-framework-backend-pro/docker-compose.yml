```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: secure_task_db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secure_task_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secure_task_backend
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python ./app/initial_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - /app/alembic/versions # Exclude this for live updates, only relevant for local development to avoid conflicts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secure_task_frontend
    env_file:
      - ./frontend/.env.development # Use frontend specific .env for build args
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # command: sh -c "npm install && npm start" # For development, use `npm run dev` or `npm start` based on frontend setup
    volumes:
      - ./frontend:/app
      - /app/node_modules # Exclude node_modules for live updates

volumes:
  postgres_data:
  redis_data:
```