name: Secure C++ App CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Cache Conan packages
      id: cache-conan
      uses: actions/cache@v3
      with:
        path: ~/.conan
        key: ${{ runner.os }}-conan-${{ hashFiles('backend/conanfile.txt') }}
        restore-keys: |
          ${{ runner.os }}-conan-

    - name: Build backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: secure-cpp-app-backend:latest
        load: true # Load image into docker daemon for testing

    - name: Run unit and integration tests
      run: |
        docker run --rm secure-cpp-app-backend:latest /app/SecureCppAppTests

  build-and-run-fullstack:
    runs-on: ubuntu-latest
    needs: build-and-test-backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and bring up Docker Compose stack
      run: |
        # Generate self-signed certs for Nginx
        mkdir -p nginx/certs
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout nginx/certs/localhost.key -out nginx/certs/localhost.crt \
            -subj "/C=US/ST=State/L=City/O=Organization/CN=localhost"
        
        # Build and start services
        docker-compose -f docker-compose.yml up -d --build --wait --timeout 120

    - name: Verify backend is running
      run: |
        docker ps
        docker logs secure_app_backend
        curl -vk https://localhost/api/health # Example health check if you add one

    - name: Run API tests (example with curl)
      run: |
        echo "Running API tests..."
        # Add basic API tests here
        # Example: Test /auth/register
        curl -k -X POST -H "Content-Type: application/json" \
             -d '{"email":"test@example.com","password":"testpassword","role":"USER"}' \
             https://localhost/api/auth/register
        
        # Example: Test /auth/login
        LOGIN_RESPONSE=$(curl -k -X POST -H "Content-Type: application/json" \
             -d '{"email":"test@example.com","password":"testpassword"}' \
             https://localhost/api/auth/login)
        echo "Login response: $LOGIN_RESPONSE"
        ACCESS_TOKEN=$(echo $LOGIN_RESPONSE | jq -r '.accessToken')
        echo "Access Token: $ACCESS_TOKEN"

        # Example: Test /users/me (requires authentication)
        curl -k -H "Authorization: Bearer $ACCESS_TOKEN" \
             https://localhost/api/users/me

        # Add more sophisticated API tests using a dedicated test framework like Newman or Postman CLI for production
        echo "API tests completed."

    - name: Teardown Docker Compose stack
      if: always() # Run even if previous steps fail
      run: docker-compose -f docker-compose.yml down --volumes