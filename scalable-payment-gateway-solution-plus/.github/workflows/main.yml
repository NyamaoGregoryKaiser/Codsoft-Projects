### 4. Testing & Quality

#### Backend Tests (Jest, Supertest)

**Test Setup & Utilities**

```javascript
// server/__tests__/setup.js (or directly in test files)
const request = require('supertest');
const app = require('../src/server'); // Your Express app
const { db } = require('../src/db/connection');
const knexConfig = require('../src/db/knexfile');
const config = require('../src/config');
const bcrypt = require('bcryptjs');
const jwt = require('jsonwebtoken');

const testDb = knex(knexConfig.test);

const setupTestDB = async () => {
  await testDb.migrate.rollback();
  await testDb.migrate.latest();
  await testDb.seed.run();
};

const tearDownTestDB = async () => {
  await testDb.migrate.rollback();
};

const generateToken = (userId, role) => {
  return jwt.sign({ id: userId, role }, config.jwtSecret, { expiresIn: config.jwtExpiresIn });
};

module.exports = { request: () => request(app), testDb, setupTestDB, tearDownTestDB, generateToken };
```