```nginx
server {
    listen 80;
    server_tokens off; # Hide Nginx version

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Configure Nginx to proxy WebSocket traffic if needed
    # (Though in our docker-compose, frontend directly connects to backend WS port)
    # This block would be used if Nginx was forwarding WS requests
    # location /ws/ {
    #     proxy_pass http://backend:9002; # Replace with your backend WS address
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "Upgrade";
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
```