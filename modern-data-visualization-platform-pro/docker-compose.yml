version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: data_viz_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: data_viz_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: data_viz_backend
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules # Preserve node_modules from host, but ensure they are mounted
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npm run migrate:run && npm run build && npm start"
    # For development, you might use:
    # command: sh -c "npm install && npm run migrate:run && npm run dev"
    # Ensure src/db/migrations is correctly found with -d parameter in migrate:run

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: data_viz_frontend
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm start
    # For production, you might change command to serve build directory
    # command: sh -c "npm run build && serve -s build -l 3000" # Requires `serve` package or similar

volumes:
  pgdata:
```

**`Dockerfile` (for backend)**
```dockerfile