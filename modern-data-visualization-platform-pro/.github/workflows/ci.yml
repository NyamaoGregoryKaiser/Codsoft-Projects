name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: data_viz_db_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          sudo docker ps
          sudo docker logs postgres || true # Try to get logs even if not fully up
          while ! nc -z localhost 5432; do
            sleep 1
          done
          echo "PostgreSQL is up!"
          echo "Waiting for Redis..."
          while ! nc -z localhost 6379; do
            sleep 1
          done
          echo "Redis is up!"

      - name: Set up .env for tests
        run: |
          echo "NODE_ENV=test" >> ./backend/.env
          echo "PORT=5000" >> ./backend/.env
          echo "API_PREFIX=/api/v1" >> ./backend/.env
          echo "DB_HOST=localhost" >> ./backend/.env
          echo "DB_PORT=5432" >> ./backend/.env
          echo "DB_USER=testuser" >> ./backend/.env
          echo "DB_PASSWORD=testpassword" >> ./backend/.env
          echo "DB_NAME=data_viz_db_test" >> ./backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> ./backend/.env # Use GitHub Secret for JWT
          echo "REDIS_HOST=localhost" >> ./backend/.env
          echo "REDIS_PORT=6379" >> ./backend/.env
        working-directory: ./backend

      - name: Run backend tests
        run: npm test -- --coverage
        working-directory: ./backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }} # Pass secret as env variable for tests

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: backend/dist

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test -- --coverage --watchAll=false
        working-directory: ./frontend
        env:
          CI: true # This makes react-scripts test run once and exit

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        env:
          REACT_APP_API_BASE_URL: /api/v1 # Build with relative path for Nginx

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

  # Conceptual CD job (requires external deployment tools/cloud provider setup)
