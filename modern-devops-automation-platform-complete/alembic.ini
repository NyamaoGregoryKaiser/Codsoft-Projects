[alembic]
# Path to migration scripts
script_location = migrations
sqlalchemy.url = postgresql://projectflow_user:projectflow_password@db:5432/projectflow_dev_db
# This is a placeholder URL for alembic to run migrations.
# In a real setup, it would typically be a specific connection string for dev/prod.
# We'll override this with Docker Compose environment variables.

revision_table_name = alembic_version

[post_write_hooks]
# You can add hooks here to run after a revision is written.
# For example, to automatically format the new migration script.
# autopep8 = python -m autopep8 --in-place %(script)

[loggers]
keys = root, alembic, sqlalchemy

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[logger_root]
level = INFO
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine
