```yaml
version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: pm-nginx
    ports:
      - "80:80"
      - "443:443" # For HTTPS if configured
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro # Mount frontend build output
    depends_on:
      - backend
      - frontend # Nginx serves frontend, but backend is for API
    restart: unless-stopped
    networks:
      - pm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pm-backend
    ports:
      - "5000:5000" # Expose backend directly for dev/debugging
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - pm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pm-frontend
    ports:
      - "5001:3000" # Expose frontend directly for dev/debugging, Vite internal port 3000
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    networks:
      - pm-network

  db:
    image: postgres:14-alpine
    container_name: pm-db
    environment:
      POSTGRES_DB: ${DB_NAME:-project_management_db}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - pm-network

  redis:
    image: redis:6.2-alpine
    container_name: pm-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - pm-network

networks:
  pm-network:
    driver: bridge

volumes:
  db_data:
```