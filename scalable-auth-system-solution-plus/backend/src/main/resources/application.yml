spring:
  application:
    name: auth-system
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none # Managed by Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.lob.non_contextual_creation: true # For PostgreSQL Large Objects
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Baseline existing DB if schema already exists (useful for dev)
    clean-disabled: true # Prevent accidental `flyway:clean` in production
  cache:
    cache-names: usersCache, tasksCache # Define caches for Caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m # Global spec for caches

server:
  port: 8080

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970} # Base64 encoded, 256-bit key
      expiration: 3600000 # 1 hour (in milliseconds)
      refresh-token:
        expiration: 604800000 # 7 days (in milliseconds)

logging:
  level:
    root: INFO
    com.example.authsystem: DEBUG # More detailed logging for our application
    org.springframework.web: INFO
    org.hibernate: INFO # Set to DEBUG for detailed SQL
    org.flywaydb: INFO

# Springdoc OpenAPI (Swagger UI) Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true # Prevent loading default petstore
    url: /api-docs
    display-request-duration: true # Show request execution time
```

