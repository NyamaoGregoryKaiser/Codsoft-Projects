```yaml
openapi: 3.0.0
info:
  title: Project Manager Mobile Backend API
  version: 1.0.0
  description: A comprehensive backend for a mobile project management application.

servers:
  - url: http://localhost:3000/v1
    description: Development server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        role:
          type: string
          enum: [user, admin]
          example: user
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 00b0f2e0-f0e0-4e00-80e0-c0b0f0e0f0e0
        name:
          type: string
          example: My First Project
        description:
          type: string
          nullable: true
          example: A sample project to get started.
        ownerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, CANCELED]
          example: PENDING
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 00b0f2e0-f0e0-4e00-80e0-c0b0f0e0f0e1
        title:
          type: string
          example: Implement user authentication
        description:
          type: string
          nullable: true
          example: Set up JWT and refresh token mechanisms.
        projectId:
          type: string
          format: uuid
        assignedToId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [TODO, IN_PROGRESS, DONE]
          example: TODO
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          example: MEDIUM
        dueDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    ErrorResponse:
      type: object
      properties:
        code:
          type: number
          example: 404
        message:
          type: string
          example: Not Found
        stack:
          type: string
          example: Error stack trace (only in dev)

tags:
  - name: Auth
    description: User authentication and authorization
  - name: Users
    description: User management
  - name: Projects
    description: Project management
  - name: Tasks
    description: Task management within projects

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  example: jane.doe@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: password123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad Request (e.g., email already taken, validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john.doe@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Unauthorized (e.g., invalid credentials)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh-tokens:
    post:
      tags:
        - Auth
      summary: Refresh access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Unauthorized (e.g., invalid or expired refresh token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Filter by user name
        - in: query
          name: email
          schema:
            type: string
          description: Filter by user email
        - in: query
          name: role
          schema:
            type: string
            enum: [user, admin]
          description: Filter by user role
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  page:
                    type: integer
                  limit:
                    type: integer
                  totalPages:
                    type: integer
                  totalResults:
                    type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Only admins can access)
    post:
      tags:
        - Users
      summary: Create a new user (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - role
              properties:
                name:
                  type: string
                  example: Test Admin
                email:
                  type: string
                  format: email
                  example: test.admin@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: adminpassword
                role:
                  type: string
                  enum: [user, admin]
                  example: admin
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the user to retrieve
      responses:
        '200':
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Only owner or admin)
        '404':
          description: User not found
    patch:
      tags:
        - Users
      summary: Update user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the user to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Name
                email:
                  type: string
                  format: email
                  example: updated.email@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: newpassword123
                role:
                  type: string
                  enum: [user, admin]
                  example: user
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
    delete:
      tags:
        - Users
      summary: Delete user by ID (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the user to delete
      responses:
        '204':
          description: User deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found

  /projects:
    get:
      tags:
        - Projects
      summary: Get all projects
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Filter by project name
        - in: query
          name: ownerId
          schema:
            type: string
            format: uuid
          description: Filter by project owner ID
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED, CANCELED]
          description: Filter by project status
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
            schema:
            type: integer
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  page:
                    type: integer
                  limit:
                    type: integer
                  totalPages:
                    type: integer
                  totalResults:
                    type: integer
        '401':
          description: Unauthorized
    post:
      tags:
        - Projects
      summary: Create a new project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: New Mobile App
                description:
                  type: string
                  nullable: true
                  example: Develop a revolutionary mobile application.
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
  /projects/{projectId}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project to retrieve
      responses:
        '200':
          description: Project object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Not owner or admin)
        '404':
          description: Project not found
    patch:
      tags:
        - Projects
      summary: Update project by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Mobile App
                description:
                  type: string
                  example: Refined description for the mobile app project.
                status:
                  type: string
                  enum: [PENDING, IN_PROGRESS, COMPLETED, CANCELED]
                  example: IN_PROGRESS
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found
    delete:
      tags:
        - Projects
      summary: Delete project by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project to delete
      responses:
        '204':
          description: Project deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found

  /projects/{projectId}/tasks:
    post:
      tags:
        - Tasks
      summary: Create a new task within a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project to add the task to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - status
                - priority
              properties:
                title:
                  type: string
                  example: Design UI mockups
                description:
                  type: string
                  nullable: true
                  example: Create wireframes and high-fidelity mockups.
                assignedToId:
                  type: string
                  format: uuid
                  nullable: true
                  example: d290f1ee-6c54-4b01-90e6-d701748f0851
                status:
                  type: string
                  enum: [TODO, IN_PROGRESS, DONE]
                  example: TODO
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH]
                  example: HIGH
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                  example: '2024-06-30T23:59:59Z'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found

  /projects/{projectId}/tasks/{taskId}:
    get:
      tags:
        - Tasks
      summary: Get task by ID within a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project
        - in: path
          name: taskId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the task to retrieve
      responses:
        '200':
          description: Task object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project or Task not found
    patch:
      tags:
        - Tasks
      summary: Update task by ID within a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project
        - in: path
          name: taskId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the task to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Finalize UI mockups
                description:
                  type: string
                  example: Incorporate feedback from stakeholders.
                assignedToId:
                  type: string
                  format: uuid
                  nullable: true
                  example: d290f1ee-6c54-4b01-90e6-d701748f0851
                status:
                  type: string
                  enum: [TODO, IN_PROGRESS, DONE]
                  example: IN_PROGRESS
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH]
                  example: HIGH
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                  example: '2024-07-15T23:59:59Z'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project or Task not found
    delete:
      tags:
        - Tasks
      summary: Delete task by ID within a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project
        - in: path
          name: taskId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the task to delete
      responses:
        '204':
          description: Task deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project or Task not found
```