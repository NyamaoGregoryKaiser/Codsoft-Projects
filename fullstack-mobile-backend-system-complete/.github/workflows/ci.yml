```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "PORT=${{ secrets.PORT || 3000 }}" > .env
          echo "NODE_ENV=test" >> .env
          echo "DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/testdb?schema=public" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'testsecret' }}" >> .env
          echo "JWT_ACCESS_EXPIRATION_MINUTES=${{ secrets.JWT_ACCESS_EXPIRATION_MINUTES || 1 }}" >> .env
          echo "JWT_REFRESH_EXPIRATION_DAYS=${{ secrets.JWT_REFRESH_EXPIRATION_DAYS || 1 }}" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "RATE_LIMIT_WINDOW_MINUTES=1" >> .env
          echo "RATE_LIMIT_MAX_REQUESTS=10" >> .env

      - name: Start PostgreSQL and Redis
        run: docker-compose up -d postgres redis

      - name: Wait for PostgreSQL and Redis to be healthy
        run: |
          ./wait-for-it.sh localhost:5432 --timeout=60 -- echo "PostgreSQL is up!"
          ./wait-for-it.sh localhost:6379 --timeout=60 -- echo "Redis is up!"
        env:
          WAIT_FOR_HOST: localhost
          WAIT_FOR_PORT_PG: 5432
          WAIT_FOR_PORT_REDIS: 6379

      # Provide a simple wait-for-it script if not using an existing action
      - name: Create wait-for-it.sh
        run: |
          echo '#!/bin/sh' > wait-for-it.sh
          echo 'TIMEOUT=15' >> wait-for-it.sh
          echo 'QUIET=0' >> wait-for-it.sh
          echo 'HOST=$1' >> wait-for-it.sh
          echo 'PORT=$2' >> wait-for-it.sh
          echo 'shift 2' >> wait-for-it.sh
          echo 'while [ $TIMEOUT -gt 0 ]; do' >> wait-for-it.sh
          echo '  if nc -z $HOST $PORT; then' >> wait-for-it.sh
          echo '    echo "$HOST:$PORT is available." ' >> wait-for-it.sh
          echo '    exit 0' >> wait-for-it.sh
          echo '  else' >> wait-for-it.sh
          echo '    if [ $QUIET -eq 0 ]; then echo "$HOST:$PORT is unavailable - waiting..."; fi' >> wait-for-it.sh
          echo '    sleep 1' >> wait-for-it.sh
          echo '  fi' >> wait-for-it.sh
          echo '  TIMEOUT=$((TIMEOUT-1))' >> wait-for-it.sh
          echo 'done' >> wait-for-it.sh
          echo 'echo "Timeout reached for $HOST:$PORT. Exiting."' >> wait-for-it.sh
          echo 'exit 1' >> wait-for-it.sh
          chmod +x wait-for-it.sh


      - name: Run Prisma Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb?schema=public

      - name: Lint Code
        run: npm run lint

      - name: Run Tests
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb?schema=public

      - name: Stop Docker containers
        if: always()
        run: docker-compose down

