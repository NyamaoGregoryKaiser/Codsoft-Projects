upstream backend_app {
    server backend:8000;
}

server {
    listen 80;
    server_name yourcms.com www.yourcms.com;

    # Redirect all HTTP to HTTPS (important for production)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourcms.com www.yourcms.com;

    # Replace with your actual SSL certificate paths
    ssl_certificate /etc/nginx/ssl/live/yourcms.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/yourcms.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Root for static frontend files
    root /usr/share/nginx/html;

    # Serve Django static files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        access_log off;
    }

    # Serve Django media files
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 1y;
        access_log off;
    }

    # Proxy API requests to Django backend
    location /api/v1/ {
        proxy_pass http://backend_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }

    # All other requests go to the React app (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
```

### 2.4 Obtain SSL Certificates (e.g., using Certbot)

It is crucial to use HTTPS in production. [Certbot](https://certbot.eff.org/) is a free and open-source tool to automate getting and renewing Let's Encrypt SSL certificates.

1.  **Stop Nginx** (if it's running on port 80/443 directly, not via Docker Compose yet):
    `sudo systemctl stop nginx` (if Nginx is installed on the host)
    Or, if you're using the `docker-compose.prod.yml` with Nginx container, ensure it's not running the full setup initially. You might need to temporarily comment out the redirect to 443 in `nginx.prod.conf` and restart Nginx with `docker-compose up -d nginx` just for the `certbot` container to bind to port 80.

2.  **Run Certbot in a Docker container:**
    ```bash
    # Create necessary directories for Certbot
    sudo mkdir -p ./certbot/www ./certbot/conf

    # Get initial certificate
    docker run -it --rm \
        -v ./certbot/www:/var/www/certbot \
        -v ./certbot/conf:/etc/letsencrypt \
        -p 80:80 \
        certbot/certbot certonly --webroot -w /var/www/certbot \
        -d yourcms.com -d www.yourcms.com \
        --email your_email@example.com --agree-tos --no-eff-email
    ```
    This will create certificates in `./certbot/conf/live/yourcms.com/`. Update `nginx.prod.conf` to point to these paths.

3.  **Start Nginx with SSL:**
    Ensure your `nginx.prod.conf` has the correct SSL paths and then run:
    ```bash
    docker-compose -f docker-compose.prod.yml up -d
    ```

### 2.5 Run in Production

From the project root on your server, use the production Docker Compose file:

```bash
docker-compose -f docker-compose.prod.yml build
docker-compose -f docker-compose.prod.yml up -d
```

### 2.6 Verify Deployment

1.  Access your domain (`https://yourcms.com`) in a web browser.
2.  Check container logs for any errors:
    ```bash
    docker-compose -f docker-compose.prod.yml logs -f backend
    docker-compose -f docker-compose.prod.yml logs -f nginx
    ```
3.  Ensure Django Admin (`https://yourcms.com/admin/`) and Swagger UI (`https://yourcms.com/api/schema/swagger-ui/`) are accessible.

### 2.7 Automated Certificate Renewal

Certbot certificates expire. Set up a cron job on your host machine to renew them regularly.

```bash
sudo crontab -e
```
Add the following line (adjust path if needed):
```
0 0 * * * docker run --rm -it -v /opt/cms-project/certbot/www:/var/www/certbot -v /opt/cms-project/certbot/conf:/etc/letsencrypt certbot/certbot renew --quiet && docker-compose -f /opt/cms-project/docker-compose.prod.yml restart nginx
```
This command attempts to renew certificates daily at midnight and restarts Nginx if successful.

### 2.8 Updating the Application

To deploy new changes:

1.  Pull the latest code on your server:
    ```bash
    cd /opt/cms-project
    git pull origin main
    ```
2.  Rebuild and restart the services:
    ```bash
    docker-compose -f docker-compose.prod.yml build
    docker-compose -f docker-compose.prod.yml up -d
    # Or, for zero-downtime deployments, consider blue/green or rolling updates
    ```
    The `entrypoint.sh` for the backend container will automatically run migrations. Frontend build happens in `frontend_builder` and its output is picked up by Nginx.

