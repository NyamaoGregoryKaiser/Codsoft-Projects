version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Mount config.json to allow easy modification without rebuilding image
      - ./src/config.json:/app/config.json
      # Mount static assets for frontend development (optional for production)
      - ./static:/app/static
    depends_on:
      - postgres
    environment:
      # Override config.json values with environment variables if needed
      # These are examples, check your config.json for actual keys
      # DROGON_APP_PORT: 8080
      # DROGON_DB_HOST: postgres
      # DROGON_DB_USER: cms_user
      # DROGON_DB_PASSWORD: cms_password
      # DROGON_DB_DATABASE: cms_db
      # JWT_SECRET: your_production_jwt_secret
      # Note: Drogon reads from its own config mechanisms first.
      # For secrets, it's better to manage them through Docker secrets or environment variables
      # that your C++ code explicitly reads if not using Drogon's config.
      # Our JwtManager and RateLimitMiddleware read from config.json, which is mounted.
      # For production, these should be securely passed.
      TZ: "UTC" # Set timezone inside container
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cms-network

  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_password
      POSTGRES_DB: cms_db
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: "UTC" # Set timezone inside container
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
      # Mount initialization scripts
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/20-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cms-network

volumes:
  pgdata:

networks:
  cms-network:
    driver: bridge