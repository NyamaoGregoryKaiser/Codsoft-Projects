name: CI/CD Pipeline for CMS-CPP

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image for C++ app
        id: docker_build_app
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: false # Do not push to registry in CI, just build
          tags: cms-cpp:latest
          load: true # Load image into Docker daemon for testing

      - name: Start services with Docker Compose (PostgreSQL + App)
        run: docker-compose up -d postgres # Start only postgres first
        working-directory: .

      - name: Wait for PostgreSQL to be ready
        run: docker-compose exec -T postgres pg_isready -U cms_user -d cms_db -t 60

      - name: Apply DB schema and seed data
        run: |
          docker-compose exec -T postgres psql -U cms_user -d cms_db -f /docker-entrypoint-initdb.d/10-schema.sql
          docker-compose exec -T postgres psql -U cms_user -d cms_db -f /docker-entrypoint-initdb.d/20-seed.sql
        working-directory: .

      - name: Start the C++ App container
        run: docker-compose up -d app
        working-directory: .

      - name: Wait for C++ App to be ready
        run: |
          # Use curl to check if the app is listening on port 8080
          # This assumes the healthcheck in docker-compose.yml for 'app' service works
          # Or a simple loop with curl
          for i in `seq 1 30`; do
            docker-compose logs app | grep "HttpServer running on" && break
            echo "Waiting for app to start..."
            sleep 5
          done
          docker-compose ps
          docker-compose logs app

      - name: Run C++ Unit and Integration Tests
        run: |
          docker-compose exec app /bin/bash -c "cd /app/build && ./cms_test_runner"
        working-directory: .

      - name: Run API Integration Tests (using curl against the running app)
        run: |
          # Example API test: Register a user
          curl -s -X POST -H "Content-Type: application/json" -d '{"username": "ci_test_user", "email": "ci_test@example.com", "password": "ci_test_password"}' http://localhost:8080/api/v1/auth/register | grep "success"
          # Example API test: Login the user
          LOGIN_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d '{"username": "ci_test_user", "password": "ci_test_password"}' http://localhost:8080/api/v1/auth/login)
          echo "$LOGIN_RESPONSE" | grep "success"
          JWT_TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.data.token')
          echo "JWT_TOKEN: $JWT_TOKEN"
          [ -n "$JWT_TOKEN" ] || { echo "JWT token not found"; exit 1; }

          # Example API test: Create content
          curl -s -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $JWT_TOKEN" -d '{"title": "CI Test Article", "body": "This is an article created during CI.", "status": "published"}' http://localhost:8080/api/v1/content | grep "success"
          # Example API test: Get all content (check for the one just created)
          curl -s http://localhost:8080/api/v1/content | grep "CI Test Article"
        env:
          # jq is used for parsing JSON, ensure it's available or install it
          # You can add: apt-get install -y jq
          DOCKER_BUILDKIT: 1 # For buildx and multi-stage builds
        working-directory: .

      - name: Stop services
        if: always()
        run: docker-compose down -v
        working-directory: .

  # You can add a separate deployment job if needed
