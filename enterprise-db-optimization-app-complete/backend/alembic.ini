```ini
[alembic]
# path to migration scripts
script_location = backend/migrations

# template environment
file_template = %%(rev)s_%%(head)s_%%(slug)s

# Revision identifiers
revision_environment = false
revision_length = 32
revision_base = 1

# set to 'true' to run the environment during
# the 'list_templates' command
environment_run_once = false

# Logging configuration
[loggers]
keys = root, alembic, sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```