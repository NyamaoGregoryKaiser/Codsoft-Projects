name: CMS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-cd.yml'

jobs:
  build-and-test-backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Backend Dependencies
      run: npm ci

    - name: Setup PostgreSQL for Tests
      run: docker-compose -f docker-compose.test.yml up -d db
      # This assumes a separate docker-compose.test.yml or adjusts the main one for test DB
      # For simplicity, we'll use a local Postgres container directly for testing.
      # If `db` service from main `docker-compose.yml` used, ensure test DB is distinct.
    
    - name: Wait for PostgreSQL
      uses: jakejarvis/wait-for-docker-action@v1.1.0
      with:
        container: cms_db_test
        wait_for: "health"
        timeout: 120 # seconds

    - name: Run Database Migrations and Seeders for Tests
      run: |
        npm run db:create
        npm run db:migrate
        npm run db:seed
      env:
        DB_USERNAME: ${{ env.TEST_DB_USERNAME }}
        DB_PASSWORD: ${{ env.TEST_DB_PASSWORD }}
        DB_DATABASE: ${{ env.TEST_DB_DATABASE }}
        DB_HOST: localhost # Assuming host network access or a linked service
        DB_PORT: 5432
        NODE_ENV: test
      # For a dedicated test container:
      # docker exec cms_db_test psql -U cms_user -c 'CREATE DATABASE cms_test_db;'
      # npm run db:reset (if using db:reset script from package.json)

    - name: Run Backend Tests
      run: npm test -- --coverage
      env:
        NODE_ENV: test
        TEST_DB_USERNAME: cms_user
        TEST_DB_PASSWORD: cms_password
        TEST_DB_DATABASE: cms_test_db
        TEST_DB_HOST: localhost
        TEST_DB_PORT: 5432
        JWT_SECRET: supersecretjwtkeyforCMS! # Must match config.js

    - name: Upload Backend Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage
        path: backend/coverage

    - name: Lint Backend Code
      run: npm run lint

  build-and-test-frontend:
    name: Frontend Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Run Frontend Tests
      run: npm test -- --coverage
      env:
        CI: true # Required for Create React App test coverage in CI

    - name: Upload Frontend Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage
        path: frontend/coverage

    - name: Lint Frontend Code
      run: npm run lint

  deploy:
    name: Deploy to Production
    needs: [build-and-test-backend, build-and-test-frontend] # Only deploy if all tests pass
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    runs-on: ubuntu-latest

    environment:
      name: Production
      url: your-production-url.com

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/cms-backend:latest
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/cms-frontend:latest
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Server (e.g., via SSH/Ansible/Kubernetes)
      # This is a placeholder step. Real deployment would involve:
      # 1. SSH into server
      # 2. Pulling latest images
      # 3. Running `docker-compose up -d` with production configuration
      # 4. Potentially running migrations if not automated on startup
      # Example with SSH:
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /path/to/your/cms-project # Or pull the latest code if not already
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d --remove-orphans
          # Optionally run migrations if not handled by entrypoint
          # docker exec cms_backend npm run db:migrate
          echo "Deployment complete on production server"

```
**Note:** For `build-and-test-backend`, a `docker-compose.test.yml` should be created to ensure the test database is isolated and configured correctly for CI. A simpler approach is to set `DB_HOST: localhost` and install `postgresql-client` on the runner, then run `createdb` and `psql` commands for setting up a local test DB without a separate container if `db` service is not directly accessible. The current setup assumes `db` refers to a running test database container. You'd typically need to define a `db` service *within the same job* for isolation, or mock the database. For `docker-compose.test.yml`, you'd essentially copy the `db` service from the main `docker-compose.yml` but point to a distinct database name like `cms_test_db`.

For the CI/CD pipeline, you'll need to set the following GitHub Secrets:
*   `DOCKER_USERNAME`
*   `DOCKER_PASSWORD`
*   `SSH_HOST`
*   `SSH_USERNAME`
*   `SSH_KEY` (Private SSH key for your deployment user)

