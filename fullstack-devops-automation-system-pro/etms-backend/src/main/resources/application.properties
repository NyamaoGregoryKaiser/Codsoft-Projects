# Server Configuration
server.port=8080

# Spring Data JPA Configuration
spring.jpa.hibernate.ddl-auto=none # Flyway manages schema
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Datasource Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://postgres:5432/etms_db
spring.datasource.username=etms_user
spring.datasource.password=etms_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration (Generate a strong secret, e.g., using `echo 'YOUR_SECRET' | base64` for production)
app.jwt-secret=averyveryverysecretkeythatisatleast256bitslongandisbase64encoded
app.jwt-expiration-milliseconds=604800000 # 7 days (7 * 24 * 60 * 60 * 1000)

# Logging
logging.level.com.etms.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE # Show parameters of SQL queries

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,prometheus,beans,env,cache
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.metrics.export.prometheus.enabled=true

# Spring Cache
spring.cache.type=caffeine