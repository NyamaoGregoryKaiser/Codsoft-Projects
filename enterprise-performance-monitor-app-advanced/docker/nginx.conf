```nginx
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Backend API server
    upstream backend_api {
        server backend:8080; # backend is the service name in docker-compose
    }

    # Frontend server (development) - Nginx serves the built static files
    # upstream frontend_dev {
    #     server frontend:3000; # frontend is the service name in docker-compose
    # }

    server {
        listen 80;
        server_name localhost;

        # Serve static files for the React frontend
        root /var/www/frontend;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the C++ backend
        location /api/ {
            proxy_pass http://backend_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optionally, if you have other static assets that need to be served directly
        # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        #     expires 30d;
        #     add_header Cache-Control "public, no-transform";
        # }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
```