```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql # Initial schema
      # For migrations, use an explicit migration step in entrypoint.sh or tools/setup_db.sh
      # - ./database/seed_data.sql:/docker-entrypoint-initdb.d/20-seed.sql # Initial seed
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "INFO"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs # Mount host logs directory
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # The entrypoint.sh handles migrations and then starts the app
    # command: ["./zenith-payments"] # Overridden by ENTRYPOINT in Dockerfile which calls entrypoint.sh

volumes:
  postgres_data:
```