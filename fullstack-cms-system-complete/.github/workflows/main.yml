```yaml
name: ApexContent CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git libjsoncpp-dev libpq-dev libssl-dev libyaml-cpp-dev zlib1g-dev libgoogle-test-dev pkg-config
        # Install Drogon - assuming manual build for CI, or system-wide if available
        # git clone https://github.com/drogonframework/drogon.git --depth=1
        # cd drogon && mkdir build && cd build && cmake .. && make -j$(nproc) && sudo make install
        # For simplicity, if Drogon is a submodule:
        # git submodule update --init --recursive
        # cmake -B build -S drogon
        # cmake --build build --target install -C drogon # Install drogcon from submodule

    - name: Configure CMake
      run: cmake -B build

    - name: Build Application
      run: cmake --build build -j$(nproc)

    - name: Run Unit Tests
      run: ./build/run_unit_tests

  docker_build_and_push:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/apexcontent:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/apexcontent:${{ github.ref_name }}
          ${{ github.ref == 'refs/heads/main' && format('{0}/apexcontent:latest', secrets.DOCKER_USERNAME) || '' }}

  deploy:
    needs: docker_build_and_push
    runs-on: self-hosted # Use a self-hosted runner on your deployment server
    if: github.ref == 'refs/heads/main'
    environment:
      name: Production
      url: https://apexcontent.yourdomain.com
    steps:
    - name: Pull Docker image
      run: |
        docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
        docker pull ${{ secrets.DOCKER_USERNAME }}/apexcontent:latest
    - name: Deploy with Docker Compose
      run: |
        # Stop existing containers, remove old images, and restart
        docker-compose down --remove-orphans
        docker-compose up -d --force-recreate
    # Add steps for health checks, rollback etc.
```