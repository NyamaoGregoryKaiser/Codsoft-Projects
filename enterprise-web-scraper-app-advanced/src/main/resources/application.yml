spring:
  application:
    name: web-scraping-tools
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webscraping}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Set to validate for production, update for development
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false # Prevents N+1 issues and keeps transactions shorter
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

# JWT Security Configuration
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:}}
```
