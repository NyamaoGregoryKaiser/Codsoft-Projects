name: Java Spring Boot CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run Unit and Integration Tests
        run: mvn test

      - name: Upload JaCoCo Coverage Report
        uses: codecov/codecov-action@v3
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          verbose: true

      - name: Archive JAR package
        uses: actions/upload-artifact@v4
        with:
          name: web-scraping-tools-jar
          path: target/web-scraping-tools-*.jar

  # Optional: Dockerize and Push to Container Registry (e.g., Docker Hub)
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only push on main branch merges/pushes
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: web-scraping-tools
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      # This secret needs to be set in GitHub repository settings for JWT generation
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: web-scraping-tools-jar
          path: target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Get current date for tag
        id: date
        run: echo "::set-output name=now::$(date +'%Y%m%d%H%M')"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.now }}
          build-args: |
            JWT_SECRET_KEY=${{ env.JWT_SECRET_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional: Deploy to a server (e.g., using SSH)
  deploy:
    name: Deploy to Server
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' # Only deploy on main branch
    runs-on: ubuntu-latest
    environment: production # Define a GitHub environment for production
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_NAME: web-scraping-tools

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            echo "Deploying ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
            docker login -u ${{ env.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            docker stop ${{ env.IMAGE_NAME }} || true
            docker rm ${{ env.IMAGE_NAME }} || true
            docker run -d --name ${{ env.IMAGE_NAME }} -p 8080:8080 \
              --env DB_HOST=postgres --env DB_NAME=webscraping --env DB_USERNAME=user --env DB_PASSWORD=password \
              --env JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            echo "Deployment complete."
            # Optionally restart docker-compose if running a stack
            # cd /path/to/your/docker-compose-files && docker-compose down && docker-compose up -d
```