version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Inject environment variables for the application
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/webscraping
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      # Use a robust, random secret key in production!
      APPLICATION_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET_KEY:}
      # SPRING_PROFILES_ACTIVE: prod # Can activate different profiles based on env
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-HELL", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: webscraping
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
