[alembic]
script_location = alembic
sqlalchemy.url = postgresql+asyncpg://user:password@host/dbname # Placeholder, overridden by env.py
target_metadata = app.db.base:Base

[logging]
level = INFO
handlers = console
qualname_for_root = CRITICAL

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
