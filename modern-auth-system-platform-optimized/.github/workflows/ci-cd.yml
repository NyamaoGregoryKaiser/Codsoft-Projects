```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build and Test Backend with Maven
        run: |
          cd backend
          mvn clean install -DskipTests
          mvn test jacoco:report
      
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/jacoco.xml
          
      - name: SonarCloud Scan
        # This step requires SonarCloud to be configured and SONAR_TOKEN to be set in GitHub secrets
        # Also need sonar-maven-plugin configured in backend/pom.xml
        # Example sonar-maven-plugin config:
        # <plugin>
        #   <groupId>org.sonarsource.scanner.maven</groupId>
        #   <artifactId>sonar-maven-plugin</artifactId>
        #   <version>3.9.1.2183</version>
        # </plugin>
        # Properties in pom.xml:
        # <sonar.organization>your-org</sonar.organization>
        # <sonar.host.url>https://sonarcloud.io</sonar.host.url>
        run: |
          cd backend
          mvn verify sonar:sonar \
            -Dsonar.projectKey=your_project_key \
            -Dsonar.organization=your_organization \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed for PR decoration
        continue-on-error: true # Allow pipeline to pass even if SonarCloud fails

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm install

      - name: Run Frontend Tests
        run: cd frontend && npm test -- --coverage --watchAll=false
        env:
          CI: true # Required for Jest to run tests in a CI environment
      
      - name: Upload Frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/lcov.info

  docker-build-and-push:
    needs: [build-and-test-backend, build-and-test-frontend] # Ensure tests pass before building images
    if: github.ref == 'refs/heads/main' # Only push Docker images on main branch merges
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: yourdockerusername/authentication-system-backend, yourdockerusername/authentication-system-frontend
          tags: |
            type=sha,format=long,prefix={{raw}}-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_API_BASE_URL=${{ vars.REACT_APP_API_BASE_URL }} # Use GitHub Actions Variables for frontend env
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production # Optional: Link to a GitHub Environment
    steps:
      - name: Deploy to Server (e.g., using SSH and Docker Compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/deployment/directory
            # Pull latest changes (if you manage infrastructure as code)
            # git pull origin main 
            
            # Login to Docker Hub on the server
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login --username ${{ secrets.DOCKER_USERNAME }} --password-stdin
            
            # Pull new images
            docker-compose pull db backend frontend # Adjust service names as per docker-compose.yml
            
            # Restart services
            docker-compose up -d --build --remove-orphans
            
            # Clean up old images
            docker system prune -f
            
            echo "Deployment successful!"
```