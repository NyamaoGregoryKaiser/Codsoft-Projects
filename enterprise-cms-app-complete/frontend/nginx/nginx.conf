server {
  listen 80;
  server_name localhost; # Replace with your domain in production

  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optionally proxy /api calls to backend (if running Nginx as reverse proxy for both)
  # In our current setup, frontend directly calls backend via REACT_APP_API_BASE_URL
  # location /api/ {
  #   proxy_pass http://backend:5000/api/; # 'backend' is the service name in docker-compose
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }
}