name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    env:
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: cms_db_test
      DB_HOST: localhost
      DB_PORT: 5432
      JWT_SECRET: supersecretjwtkeyforlocaltest
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: '' # No password for local test redis
    services:
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        env:
          REDIS_PASSWORD: ${{ env.REDIS_PASSWORD }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Wait for Postgres & Redis
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U ${{ env.DB_USER }}; do
            echo "Waiting for postgres..."
            sleep 2
          done
          echo "Postgres is up!"

          until redis-cli ping; do
            echo "Waiting for redis..."
            sleep 2
          done
          echo "Redis is up!"
        working-directory: ./backend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage/lcov-report

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test -- --coverage --watchAll=false # Run Jest tests with coverage, without watch mode
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main' # Deploy only on push to main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download backend coverage report
        uses: actions/download-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage/lcov-report

      - name: Download frontend build
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

      - name: Configure AWS credentials (example for AWS ECR/ECS)
        # This step would be specific to your cloud provider
        # For AWS:
        # uses: aws-actions/configure-aws-credentials@v1
        # with:
        #   aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        #   aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        #   aws-region