```yaml
version: '3.8'

services:
  pms-postgres:
    image: postgres:13-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-pmsuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pmspassword}
      POSTGRES_DB: ${DB_NAME:-pmsdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  pms-redis:
    image: redis:6-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-} # Optional password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pms-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_DIALECT: postgres
      DB_HOST: pms-postgres # Service name in docker-compose
      DB_PORT: 5432
      DB_USER: ${DB_USER:-pmsuser}
      DB_PASSWORD: ${DB_PASSWORD:-pmspassword}
      DB_NAME: ${DB_NAME:-pmsdb}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REDIS_HOST: pms-redis # Service name in docker-compose
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      pms-postgres:
        condition: service_healthy
      pms-redis:
        condition: service_healthy
    # Command to run migrations and seeds after DB is up
    # This is a simple approach for local dev. In production, consider separate migration jobs.
    command: ["sh", "-c", "npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all && npm start"]

  pms-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx)
    environment:
      # REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # Use absolute path if not using Nginx proxy
      # For local Docker setup, Nginx proxy will handle `/api` requests
      # and forward them to `pms-backend:5000`. So, no need for REACT_APP_API_BASE_URL here
    depends_on:
      pms-backend:
        condition: service_started # Frontend only needs backend to be up, not necessarily healthy (yet)

volumes:
  postgres_data:
  redis_data:
```