```nginx
# nginx.conf
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Gzip compression
  gzip on;
  gzip_comp_level 2;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  server {
    listen 80;
    server_name localhost; # Replace with your domain in production

    # Frontend serving (React build)
    location / {
      root /usr/share/nginx/html; # Points to /client/build in docker-compose
      index index.html index.htm;
      try_files $uri $uri/ /index.html;
    }

    # API Gateway
    location /api/ {
      proxy_pass http://backend:5000/; # Points to the backend service in Docker Compose
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Optional: Serve static assets for uploads, e.g., product images
    # location /uploads/ {
    #   alias /app/server/uploads/; # Path inside the backend container if serving directly
    #   add_header Cache-Control "public, max-age=31536000"; # Cache for 1 year
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
    }
  }
}

