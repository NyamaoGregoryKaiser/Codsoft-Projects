version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432" # Expose for local development/tools
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ecommerce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379" # Expose for local development/tools
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: "postgresql://user:password@db:5432/ecommerce_db"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: supersecretjwtkey # Use a strong secret in production
      BCRYPT_SALT_ROUNDS: 10
      CORS_ORIGIN: "http://localhost:3000" # Match frontend port
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: adminpassword # Change this in production
      RUN_SEEDS: "true" # Set to "true" ONLY for initial development setup, then "false"
    ports:
      - "5000:5000" # Expose backend API
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount for hot-reloading in development
      - /app/node_modules # Exclude node_modules from host mount
    command: ["npm", "run", "dev"] # Use nodemon for development

  frontend:
    build: ./frontend
    restart: always
    environment:
      NODE_ENV: development
      REACT_APP_API_BASE_URL: "http://localhost:5000/api/v1"
    ports:
      - "3000:3000" # Expose frontend React app
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app # Mount for hot-reloading in development
      - /app/node_modules # Exclude node_modules from host mount
    command: ["npm", "start"] # Use react-scripts start for development

volumes:
  pgdata:
  redisdata: