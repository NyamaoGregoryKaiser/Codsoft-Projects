# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/ecommerce_test_db?schema=public"
      JWT_SECRET: "testsecret"
      NODE_ENV: test
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: ecommerce_test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend dependencies
        run: npm install
        working-directory: ./server

      - name: Wait for PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client && pg_isready -h localhost -p 5432 -U user -d ecommerce_test_db
        # This is a bit of a hack. GitHub Actions `services` typically handles this.
        # Adding a manual check for robustness or for specific setup requirements.

      - name: Generate Prisma client & Migrate DB (Backend Test)
        run: |
          npx prisma generate
          npx prisma migrate dev --name init_test_db --skip-seed
        working-directory: ./server

      - name: Run Backend Tests
        run: npm test
        working-directory: ./server

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-coverage-report
          path: ./server/coverage

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        run: npm install
        working-directory: ./client

      - name: Build Frontend
        run: npm run build
        working-directory: ./client
        env:
          REACT_APP_API_BASE_URL: /api # For production build, assume API is proxied

      - name: Upload Frontend Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: ./client/build

