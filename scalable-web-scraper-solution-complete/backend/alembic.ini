[alembic]
# Path to the migrations script directory
script_location = alembic
# Template used to generate new migration scripts
version_locations = %(script_location)s/versions

# Where to store database connection string. Can be env var or in this file.
sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/scraper_db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
