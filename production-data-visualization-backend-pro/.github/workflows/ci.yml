name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Docker Image
        run: docker build -t datavizpro-backend-test -f server/Dockerfile .

      - name: Start services (DB and Backend)
        run: |
          docker-compose -f docker-compose.yml up -d db
          docker-compose -f docker-compose.yml run --rm backend /bin/bash -c "sleep 10 && ./build/dataviz_server &" # Run server in background
          sleep 20 # Give server time to start

      - name: Run Backend Tests
        # Ensure database is ready before running tests that depend on it
        run: |
          docker-compose -f docker-compose.yml exec db pg_isready -U user -d datavizpro -t 0
          docker-compose -f docker-compose.yml exec backend /bin/bash -c "./build/tests/dataviz_tests"

      - name: Run API Integration Tests (using curl against the running backend)
        run: |
          # Basic health check
          curl -f http://localhost:8080/health || exit 1
          echo "Health check passed!"

          # Example: Register user
          REGISTER_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d '{"username": "ci_user", "email": "ci@example.com", "password": "password123"}' http://localhost:8080/api/v1/auth/register)
          echo "Register response: $REGISTER_RESPONSE"
          # Add checks for 201 status or expected JSON

          # Example: Login user and get token
          LOGIN_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d '{"username": "ci_user", "password": "password123"}' http://localhost:8080/api/v1/auth/login)
          echo "Login response: $LOGIN_RESPONSE"
          AUTH_TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r .token) # Requires jq
          if [ -z "$AUTH_TOKEN" ]; then
            echo "Failed to get auth token."
            exit 1
          fi
          echo "Auth Token: $AUTH_TOKEN"

          # Example: Access protected endpoint
          curl -f -H "Authorization: Bearer $AUTH_TOKEN" http://localhost:8080/api/v1/users/me || exit 1
          echo "Protected endpoint access successful!"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Frontend Unit Tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false # Run tests with coverage

      # - name: Build Frontend
      #   working-directory: ./frontend
      #   run: npm run build # Optional: Build frontend to ensure it compiles

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-test-backend, build-and-test-frontend]
    runs-on: ubuntu-latest
    environment: Production # GitHub Environments for protection rules
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: yourdockerhubusername/datavizpro-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: yourdockerhubusername/datavizpro-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server (e.g., via SSH/Ansible/Kubernetes)
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Update docker-compose.yml to pull latest images
            cd /path/to/your/deployment
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f # Clean up old images
```