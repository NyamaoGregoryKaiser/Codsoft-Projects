```yaml
name: TaskFlow Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**' # Only trigger if changes are in the backend directory
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # All commands run from the 'backend' directory

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3 # Using recommended Gradle setup action

      - name: Run Spotless Check
        run: ./gradlew spotlessCheck

      - name: Run Unit and Integration Tests
        run: ./gradlew test

      - name: Build with Gradle
        run: ./gradlew build -x test # Skip tests as they were run in previous step

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/build/reports/jacoco/test/html
          retention-days: 5

      - name: Upload executable JAR
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-backend-jar
          path: backend/build/libs/*.jar
          retention-days: 5

