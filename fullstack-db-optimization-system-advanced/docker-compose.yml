version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: optimizer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_for_dev # Use a strong password in production
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optimizer_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.example # Mount the .env file for environment variables
    environment:
      DATABASE_URL: "postgresql://postgres:postgres_password_for_dev@db:5432/optimizer_db?schema=public"
      # Ensure other backend environment variables from .env.example are set or passed here
      PORT: 5000
      JWT_SECRET: supersecretjwtkey
      JWT_EXPIRES_IN: 1h
      REFRESH_TOKEN_SECRET: supersecretrefreshkey
      REFRESH_TOKEN_EXPIRES_IN: 7d
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
      CACHE_TTL_SECONDS: 3600
      COLLECTOR_SCHEDULE_CRON: "*/5 * * * *" # Every 5 minutes for demo
      SLOW_QUERY_THRESHOLD_MS: 500
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount backend source code
      - /app/node_modules # Anonymous volume to prevent host node_modules overwriting container's
    command: sh -c "npx prisma migrate deploy && node seed.js && npm run dev" # Run migrations, seed, then start dev server

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      REACT_APP_API_URL: http://localhost:5000/api # Point to backend service
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app # Mount frontend source code
      - /app/node_modules # Anonymous volume
    command: npm start

volumes:
  db_data:
```

