name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5433:5432 # Map to a different port for testing
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6380:6379 # Map to a different port for testing
        options: >-
          --health-cmd redis-cli ping
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Wait for PostgreSQL and Redis to be ready
      run: |
        echo "Waiting for PostgreSQL..."
        for i in $(seq 1 10); do
          pg_isready -h localhost -p 5433 -U testuser -d test_db && break
          echo "PostgreSQL not ready, waiting 5s..."
          sleep 5
        done
        pg_isready -h localhost -p 5433 -U testuser -d test_db
        echo "PostgreSQL is ready."

        echo "Waiting for Redis..."
        for i in $(seq 1 10); do
          redis-cli -h localhost -p 6380 ping && break
          echo "Redis not ready, waiting 5s..."
          sleep 5
        done
        redis-cli -h localhost -p 6380 ping
        echo "Redis is ready."

    - name: Set environment variables for tests
      run: |
        echo "DATABASE_URL=postgresql+asyncpg://testuser:testpassword@localhost:5433/test_db" >> $GITHUB_ENV
        echo "REDIS_URL=redis://localhost:6380/0" >> $GITHUB_ENV
        echo "SECRET_KEY=test_secret_key" >> $GITHUB_ENV
        echo "ACCESS_TOKEN_EXPIRE_MINUTES=1" >> $GITHUB_ENV
        echo "FASTAPI_ENV=testing" >> $GITHUB_ENV

    - name: Run Alembic migrations for test DB
      run: |
        alembic upgrade head
      working-directory: . # Ensure alembic looks for alembic.ini in root

    - name: Run backend tests
      run: pytest --cov=app --cov-report=xml
    
    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: true
        verbose: true

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend

    - name: Run frontend lint
      run: npm run lint
      working-directory: frontend

    - name: Run frontend tests
      run: npm test -- --watchAll=false # Run tests once without watch mode
      working-directory: frontend
      env:
        CI: true # Required for Create React App tests in CI

  # Placeholder for a simple deployment stage (e.g., to Vercel/Netlify for frontend, or Docker Hub for backend image)
