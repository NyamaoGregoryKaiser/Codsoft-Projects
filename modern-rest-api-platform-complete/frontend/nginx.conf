server {
    listen 80;
    server_name localhost; # Replace with your domain in production

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # For React routing
    }

    # You can also proxy API requests if running API on same domain
    # For this project, API is accessed directly via REACT_APP_API_BASE_URL
    # which points to :8000. If you wanted to proxy, uncomment and configure:
    # location /api/v1/ {
    #     proxy_pass http://backend:8000; # 'backend' is the service name in docker-compose
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
