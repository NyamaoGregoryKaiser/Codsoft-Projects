[alembic]
script_location = alembic
sqlalchemy.url = ${DATABASE_URL}
# If you don't want to use environment variables for DB_URL, uncomment and set directly:
# sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/app_db

# Logging configuration
[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
