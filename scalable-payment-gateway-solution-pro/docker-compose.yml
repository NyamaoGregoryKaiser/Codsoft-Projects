version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose for local development/tools

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    depends_on:
      - db
    # Wait for DB to be ready and then run migrations/seeds
    command: sh -c "sleep 5 && npm run migrate && npm run seed && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    ports:
      - "3000:80" # Map host port 3000 to container's port 80
    depends_on:
      - backend

volumes:
  pgdata: