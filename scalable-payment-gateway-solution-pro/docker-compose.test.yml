version: '3.8'

services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5432:5432" # Keep exposed for local test runner access
    # Use a named volume or tmpfs for test data, or just let it be ephemeral
    # volumes:
    #   - pgtestdata:/var/lib/postgresql/data # Optional: persistent test data, or use tmpfs for speed
    tmpfs: /var/lib/postgresql/data # Faster, ephemeral storage for tests

# volumes:
#   pgtestdata: # Only if you want persistent test data