```yaml
name: Payment Processor CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests # Build without running tests yet

      - name: Run Unit Tests
        run: mvn test

      - name: Run Integration Tests
        # Use Docker Compose to spin up a test database
        run: docker-compose -f docker-compose.test.yml up --build -d && mvn verify && docker-compose -f docker-compose.test.yml down
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: payment_processor_test
          DB_USER: test_user
          DB_PASSWORD: test_password
          JWT_SECRET: a_very_long_and_secure_secret_key_that_should_be_at_least_256_bits_long_and_generated_randomly

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: payment-processor-app
          path: target/*.jar

  deploy-dev:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: Development
      url: http://your-dev-server-ip:8080
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Download application artifact
        uses: actions/download-artifact@v4
        with:
          name: payment-processor-app
      
      - name: Deploy to Development Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            # Create directory if it doesn't exist
            mkdir -p /opt/payment-processor
            # Stop existing container and remove it
            docker stop payment-processor-dev || true
            docker rm payment-processor-dev || true
            # Copy new JAR
            cp app.jar /opt/payment-processor/app.jar
            # Recreate container
            docker run -d --name payment-processor-dev \
            -p 8080:8080 \
            --network host \ # Or connect to an existing Docker network
            -e DB_HOST=${{ secrets.DEV_DB_HOST }} \
            -e DB_PORT=${{ secrets.DEV_DB_PORT }} \
            -e DB_NAME=${{ secrets.DEV_DB_NAME }} \
            -e DB_USER=${{ secrets.DEV_DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }} \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            openjdk:17-jre-slim java -jar /opt/payment-processor/app.jar

  # deploy-prod:
  #   needs: build-and-test # Assuming manual trigger or after deploy-dev validation
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: Production
  #     url: https://your-prod-domain.com
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   steps:
  #     - name: Download application artifact
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: payment-processor-app
      
  #     - name: Deploy to Production Server (e.g., Kubernetes)
  #       # This would involve more sophisticated deployment, like updating Kubernetes manifests,
  #       # rolling deployments, blue/green deployments, etc.
  #       run: |
  #         echo "Deploying to production..."
  #         # Example: kubectl apply -f kubernetes/deployment.yaml
  #         # Or use a dedicated deployment tool like ArgoCD, Spinnaker, Jenkins X
```

*Note: For integration tests to run with a dedicated DB container, you might need a `docker-compose.test.yml` file similar to `docker-compose.yml` but configured for a test database.*

#### `docker-compose.test.yml` (for CI/CD integration tests)

```yaml
version: '3.8'
services:
  db-test:
    image: postgres:15-alpine
    container_name: payment-processor-db-test
    environment:
      POSTGRES_DB: payment_processor_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432" # Expose for Testcontainers connection from host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d payment_processor_test"]
      interval: 5s
      timeout: 5s
      retries: 5
```
*And update `application-test.yml` for tests to point to `localhost:5432` and `payment_processor_test`.*

