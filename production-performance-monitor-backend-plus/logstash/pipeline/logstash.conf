```conf
input {
  tcp {
    port => 5000
    codec => json_lines
    type => "logback"
  }
}

filter {
  if [type] == "logback" {
    # Add fields from logstash-logback-encoder
    # Example: If your encoder provides a 'loggerName' field
    # mutate { add_field => { "logger" => "%{loggerName}" } }

    # Convert timestamp string to actual timestamp
    date {
      match => ["@timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
      remove_field => ["timestamp"] # Remove the original string field
    }

    # Extract OpenTelemetry trace and span IDs from MDC
    if [mdc] {
      if [mdc][traceId] {
        mutate { add_field => { "trace.id" => "%{[mdc][traceId]}" } }
      }
      if [mdc][spanId] {
        mutate { add_field => { "span.id" => "%{[mdc][spanId]}" } }
      }
      mutate { remove_field => ["mdc"] }
    }

    # Custom log levels
    if [level] {
      mutate { add_field => { "log.level" => "%{level}" } }
      mutate { remove_field => ["level"] }
    }

    # Extract service name (defined in logback-spring.xml customFields)
    if [app_name] {
      mutate { add_field => { "service.name" => "%{app_name}" } }
      mutate { remove_field => ["app_name"] }
    }

    # Rename some fields to match Elastic Common Schema (ECS) where appropriate
    mutate {
      rename => { "loggerName" => "log.logger" }
      rename => { "threadName" => "process.thread.name" }
      rename => { "logLevel" => "log.level" } # Assuming logback-encoder uses logLevel
      rename => { "message" => "message" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"] # Elasticsearch service name in docker-compose
    index => "logstash-%{+YYYY.MM.dd}"
    # user => "elastic" # Uncomment if security is enabled in Elasticsearch
    # password => "changeme" # Uncomment if security is enabled in Elasticsearch
  }
  stdout { codec => rubydebug } # For debugging Logstash output
}
```