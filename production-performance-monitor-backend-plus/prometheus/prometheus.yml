```yaml
global:
  scrape_interval: 15s # How frequently to scrape targets
  evaluation_interval: 15s # How frequently to evaluate rules

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090'] # Prometheus self-monitoring

  - job_name: 'tasksyncpro-backend'
    metrics_path: '/actuator/prometheus' # Spring Boot Actuator endpoint for Prometheus metrics
    scrape_interval: 5s # Scrape more frequently for application metrics
    static_configs:
      - targets: ['app:8080'] # 'app' is the service name from docker-compose

  # Optional: Node exporter for host metrics
  # - job_name: 'node_exporter'
  #   static_configs:
  #     - targets: ['node_exporter:9100'] # Assuming a node_exporter service
```