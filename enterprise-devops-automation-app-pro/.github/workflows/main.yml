name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Configure .env files for tests
        run: |
          # Create a dummy .env for backend tests. Database will be in-memory or a temporary one.
          # For real CI, you'd configure a test database.
          echo "NODE_ENV=test" > server/.env
          echo "PORT=5000" >> server/.env
          echo "DATABASE_URL=sqlite::memory:" >> server/.env # Use in-memory SQLite for speed
          echo "JWT_SECRET=test_jwt_secret" >> server/.env
          echo "JWT_EXPIRES_IN=1h" >> server/.env
          echo "REDIS_HOST=localhost" >> server/.env
          echo "REDIS_PORT=6379" >> server/.env
          echo "REDIS_PASSWORD=test_redis_pass" >> server/.env # Not actually used with in-memory SQLite
          echo "RATE_LIMIT_WINDOW_MS=1" >> server/.env
          echo "RATE_LIMIT_MAX_REQUESTS=1000" >> server/.env
          echo "LOG_LEVEL=error" >> server/.env # Suppress logs during CI tests

          # Create a dummy .env for frontend tests (usually not needed for build)
          echo "REACT_APP_API_BASE_URL=http://localhost:5000/api" > client/.env

      - name: Install Backend Dependencies
        run: |
          cd server
          npm install

      - name: Run Backend Lint
        run: |
          cd server
          npm run lint

      - name: Run Backend Tests
        run: |
          cd server
          npm test

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm install

      - name: Run Frontend Lint
        run: |
          cd client
          npm run lint

      - name: Run Frontend Tests
        run: |
          cd client
          npm test

      - name: Build Frontend for Production
        run: |
          cd client
          npm run build

      - name: Login to Docker Hub (if pushing images)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only push on main branch
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DOCKER_IMAGE_BACKEND: your-dockerhub-username/ecommerce-backend
          DOCKER_IMAGE_FRONTEND: your-dockerhub-username/ecommerce-frontend
          TAG: ${{ github.sha }} # Use commit SHA as tag
        run: |
          docker build -t ${DOCKER_IMAGE_BACKEND}:${TAG} -t ${DOCKER_IMAGE_BACKEND}:latest -f Dockerfile.backend ./server
          docker push ${DOCKER_IMAGE_BACKEND}:${TAG}
          docker push ${DOCKER_IMAGE_BACKEND}:latest

          docker build -t ${DOCKER_IMAGE_FRONTEND}:${TAG} -t ${DOCKER_IMAGE_FRONTEND}:latest -f Dockerfile.frontend ./client \
            --build-arg REACT_APP_API_BASE_URL=https://api.yourdomain.com/api # Replace with your production API URL
          docker push ${DOCKER_IMAGE_FRONTEND}:${TAG}
          docker push ${DOCKER_IMAGE_FRONTEND}:latest

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://yourdomain.com # Replace with your actual deployed URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Remote Server (Example: using SSH and Docker Compose)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          # Pass production environment variables to the server
          POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
          POSTGRES_PORT: 5432
          BACKEND_PORT: 8080 # Or 5000
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          JWT_EXPIRES_IN: 7d
          REDIS_PASS: ${{ secrets.PROD_REDIS_PASSWORD }}
          RATE_LIMIT_WINDOW_MS: 60000
          RATE_LIMIT_MAX_REQUESTS: 100
          LOG_LEVEL: info
          REACT_APP_API_BASE_URL: https://api.yourdomain.com/api # Production API URL
        run: |
          echo "$SSH_PRIVATE_KEY" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'EOF'
            set -euo pipefail

            # Create deployment directory if it doesn't exist
            DEPLOY_DIR="/opt/ecommerce_app"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Pull the latest docker-compose.yml from the repository
            # In a real scenario, you'd use git pull or copy relevant files
            # For simplicity, we're assuming docker-compose.yml is already present
            # or you're fetching it. For this example, we'll manually create it.
            # Example: git clone https://github.com/your/repo.git .
            # For this example, we'll recreate the docker-compose and .env
            
            # Login to Docker Hub
            echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin

            # Create production .env file on the server
            cat << EOT > .env
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_PORT=${POSTGRES_PORT}
            BACKEND_PORT=${BACKEND_PORT}
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_PASS=${REDIS_PASS}
            RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
            RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
            LOG_LEVEL=${LOG_LEVEL}
            CLIENT_PORT=80 # Nginx exposes on 80
            REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL}
            EOT

            # Create production docker-compose.yml on the server
            cat << EOT > docker-compose.yml
            version: '3.8'
            services:
              db:
                image: postgres:15-alpine
                environment:
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                  POSTGRES_DB: ${POSTGRES_DB}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTRES_DB}"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped

              redis:
                image: redis:7-alpine
                command: redis-server --requirepass ${REDIS_PASS}
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "--raw", "AUTH", "${REDIS_PASS}", "PING"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
                restart: unless-stopped

              backend:
                image: ${DOCKER_USERNAME}/ecommerce-backend:latest # Use the latest image built by CI
                environment:
                  NODE_ENV: production
                  PORT: ${BACKEND_PORT}
                  DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
                  JWT_SECRET: ${JWT_SECRET}
                  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
                  REDIS_HOST: redis
                  REDIS_PORT: 6379
                  REDIS_PASSWORD: ${REDIS_PASS}
                  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
                  RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
                  LOG_LEVEL: ${LOG_LEVEL}
                  CLIENT_URL: https://yourdomain.com # For CORS in production
                ports:
                  - "${BACKEND_PORT}:${BACKEND_PORT}"
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                restart: unless-stopped
                command: sh -c "npx sequelize-cli db:migrate && npm start" # Run migrations, then start server

              frontend:
                image: ${DOCKER_USERNAME}/ecommerce-frontend:latest # Use the latest image built by CI
                ports:
                  - "80:80" # Map host port 80 to container port 80 (Nginx)
                environment:
                  NODE_ENV: production
                  REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL} # Build-time variable, but good for clarity
                depends_on:
                  backend:
                    condition: service_started # Frontend does not depend on backend health for startup, just existence
                restart: unless-stopped

            volumes:
              postgres_data:
              redis_data:

            networks:
              default:
                name: ecommerce_network
            EOT

            # Bring down previous services, pull new images, and bring up new services
            echo "Stopping existing services and pulling latest images..."
            docker compose pull
            docker compose up -d --remove-orphans

            echo "Deployment complete."
            EOF
          rm deploy_key