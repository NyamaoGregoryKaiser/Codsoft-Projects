server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Redirect all requests to the backend API if hitting /api
  # This is for a reverse proxy setup if frontend and backend share the same domain.
  # If frontend serves from example.com and backend from api.example.com, this is not needed.
  # For Docker Compose in local dev, direct calls to backend:5000 are made.
  # This part is more for a single production ingress/gateway.
  # location /api/ {
  #   proxy_pass http://backend:5000/api/; # 'backend' is the service name in docker-compose
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }
}