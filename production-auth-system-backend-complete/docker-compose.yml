version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend # Mount local code for live reloading in development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload # --reload for development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s # Give backend time to start and connect to DB/Redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auth_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80" # Map host port 3000 to container's Nginx port 80
    depends_on:
      backend:
        condition: service_healthy
    # For development, if you want live-reloading from React dev server
    # command: npm start
    # volumes:
    #   - ./frontend:/app/frontend
    #   - /app/frontend/node_modules # Prevents host node_modules from overriding container's
    # ports:
    #   - "3000:3000" # Map React dev server port
    # The default Dockerfile uses Nginx to serve a production build.
    # If you want React dev server for live dev, comment out the Nginx part in Dockerfile
    # and uncomment the `command` and `volumes` above.

volumes:
  postgres_data:
