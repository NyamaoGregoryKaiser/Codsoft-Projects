```yaml
spring:
  jpa:
    hibernate:
      ddl-auto: validate # STRICTLY validate schema against entity definitions
  datasource:
    # Production values will typically be injected via environment variables
    # e.g., using Kubernetes secrets, Docker compose environment variables
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:ml_util_db}
    username: ${DB_USERNAME:mluser}
    password: ${DB_PASSWORD:mlpassword}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true # Keep Flyway enabled for production migrations
logging:
  level:
    com.mlutil: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
```