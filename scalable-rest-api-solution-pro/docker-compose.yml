```yaml
version: '3.8'

services:
  db:
    container_name: pm_db
    build:
      context: ./docker
      dockerfile: Dockerfile.db
    # For production, use a bind mount for persistent data:
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata # Ensure data persists across container restarts
    environment:
      POSTGRES_DB: project_management_db
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d project_management_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    container_name: pm_api
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "9080:9080"
    environment:
      # These override the ENV in Dockerfile.app
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 9080
      # Connect to the PostgreSQL database in the `db` service
      # DB_PATH: "postgresql://appuser:password@db:5432/project_management_db"
      # For SQLite in Docker (good for dev, less for prod if db is dynamic)
      DB_PATH: /app/database/project_management.db
      JWT_SECRET: ${JWT_SECRET} # Use value from host .env
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      RATE_LIMIT_TIME_WINDOW_SECONDS: ${RATE_LIMIT_TIME_WINDOW_SECONDS}
      LOG_CONFIG_PATH: /app/config/log_config.json
    volumes:
      - ./logs:/app/logs # For persistent application logs
      - ./database:/app/database # For SQLite db file and migrations
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be healthy
    restart: unless-stopped

volumes:
  pgdata: # Define the named volume for PostgreSQL data
```