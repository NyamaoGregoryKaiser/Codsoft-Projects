```nginx
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Try to serve files directly, then fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy for the backend
    # This assumes Nginx is serving frontend and also proxying to backend
    # If frontend is served separately (e.g., via a CDN), remove this.
    # We are setting REACT_APP_API_BASE_URL to point to /api in frontend .env
    # so requests from frontend go to /api and this Nginx proxies them to backend service.
    location /api/ {
        proxy_pass http://backend:5000; # 'backend' is the service name in docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # Add CORS headers if needed for direct Nginx proxy
        # add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Socket.IO proxy for real-time communication
    # We are setting REACT_APP_SOCKET_URL to point to http://<nginx_host> or ws://<nginx_host>
    # so requests from frontend go to root and this Nginx proxies them to backend service.
    # Ensure this path matches how your Socket.IO client connects (e.g., io('ws://localhost') or io('/'))
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/; # 'backend' is the service name in docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # For SockJS fallback, might need to disable caching for these requests
        proxy_buffering off;
    }
}
