```yaml
name: CI/CD Pipeline for Chat Application

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ------------------------------------------------------------------------------------------
  # Backend Build, Test & Lint
  # ------------------------------------------------------------------------------------------
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env: # Set environment variables for tests
      NODE_ENV: test
      JWT_SECRET: test_secret
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: chat_app_test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    services: # Spin up a test database and redis for integration tests
      postgres_test:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        ports:
          - 5432:5432 # Map to localhost for backend tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis_test:
        image: redis:6-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in `seq 1 10`; do
            nc -z localhost 5432 && echo "PostgreSQL is up" && break
            echo "Waiting for PostgreSQL to come up..."
            sleep 5
          done

      - name: Run database migrations for tests
        run: npx sequelize-cli db:migrate
        env:
          DATABASE_URL: postgres://${{ env.DB_USER }}:${{ env.DB_PASSWORD }}@${{ env.DB_HOST }}:${{ env.DB_PORT }}/${{ env.DB_NAME }}

      - name: Run ESLint
        run: npx eslint . --max-warnings=0

      - name: Run Backend Tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always() # Always upload coverage artifacts
        with:
          name: backend-coverage-report
          path: backend/coverage/

  # ------------------------------------------------------------------------------------------
  # Frontend Build, Test & Lint
  # ------------------------------------------------------------------------------------------
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint # Assuming you have a lint script configured

      - name: Run Frontend Tests
        run: npm test -- --coverage --watchAll=false # `--watchAll=false` for CI environments

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

      - name: Build Frontend for production
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: https://your.prod.api.com/api # Replace with your actual production API URL
          REACT_APP_SOCKET_URL: https://your.prod.api.com # Replace with your actual production Socket URL

  # ------------------------------------------------------------------------------------------
  # Deployment (Example - Manual trigger for now, could be on main branch push)
  # ------------------------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [backend, frontend] # Ensure both backend and frontend CIs pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success() # Only deploy from main branch if previous jobs succeeded
    environment:
      name: Production
      url: https://your-chat-app.com # Replace with your app's production URL
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Note: For actual deployment, you would build and push Docker images
      # to a container registry (e.g., Docker Hub, AWS ECR, GCR)
      # and then trigger a deployment to your cloud provider (e.g., Kubernetes, AWS ECS, Heroku).

      - name: Login to Docker Hub (Example)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: your-dockerhub-username/chat-backend:${{ github.sha }}

      - name: Build & Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: your-dockerhub-username/chat-frontend:${{ github.sha }}
          build-args: |
            REACT_APP_API_BASE_URL=https://your.prod.api.com/api # IMPORTANT: Use production URLs
            REACT_APP_SOCKET_URL=https://your.prod.api.com # IMPORTANT: Use production URLs

      - name: Deploy to Cloud Provider (Example - using SSH to a server)
        # This is highly dependent on your infrastructure.
        # Could be a kubectl command, AWS CLI, Ansible playbook, etc.
        # For simplicity, a placeholder using SSH:
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/deployment/directory
            # Pull the latest images
            docker pull your-dockerhub-username/chat-backend:${{ github.sha }}
            docker pull your-dockerhub-username/chat-frontend:${{ github.sha }}
            # Update docker-compose.yml to use the new image tags
            # (or use Kubernetes manifests with image update strategies)
            # Example: sed -i "s|chat-backend:.*|chat-backend:${{ github.sha }}|g" docker-compose.prod.yml
            # Example: docker-compose -f docker-compose.prod.yml up -d
            echo "Deployment triggered for commit ${{ github.sha }}"

      - name: Notify on Slack (Example)
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: '#deployments'
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Chat App deployment to Production ${{ job.status }}"
          SLACK_FOOTER: "CI/CD by GitHub Actions"
```
