version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chat_db
    environment:
      POSTGRES_DB: ${DB_NAME:-chat_db}
      POSTGRES_USER: ${DB_USER:-chat_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-HEALTCHECK", "pg_isready", "-U", "$${POSTGRES_USER}", "-d", "$${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: chat_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-chat_db}
      DB_USER: ${DB_USER:-chat_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-thisisasecretkeyforjwttoensuresecurityandshouldbeverylongandrandom}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        # Pass environment variables to the React build process
        REACT_APP_API_BASE_URL: http://localhost:8080/api # For local dev with proxy
        REACT_APP_WEBSOCKET_URL: http://localhost:8080/websocket # For local dev with proxy
    container_name: chat_frontend
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (nginx)
    environment:
      # These are runtime variables for the frontend, but create-react-app reads them at build time
      # For a production build served by Nginx, they must be set during the build stage as ARGs,
      # or dynamically injected into the index.html via a separate script if runtime changes are needed.
      # For simplicity in this setup, they are passed as build ARGs.
      # If running `npm start` in the container for development, these ENV vars would be read directly.
    depends_on:
      backend:
        condition: service_started
    restart: on-failure

volumes:
  db_data:
