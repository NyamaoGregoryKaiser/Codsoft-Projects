```nginx
server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API requests to the backend FastAPI service
  location /api/ {
    proxy_pass http://backend:8000; # 'backend' is the service name in docker-compose
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Add rate limiting headers if Nginx is to enforce it
    # Nginx can also add rate limiting here using ngx_http_limit_req_module
  }
}
```