```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ml_utilities_db
    environment:
      POSTGRES_DB: ${DB_NAME:-ml_utilities_db}
      POSTGRES_USER: ${DB_USER:-ml_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ml_password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ml_user} -d ${DB_NAME:-ml_utilities_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ml_utilities_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ml_utilities_db}
      DB_USER: ${DB_USER:-ml_user}
      DB_PASSWORD: ${DB_PASSWORD:-ml_password}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminpassword}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src  # Mount for live reload in development
      - /app/node_modules # Keep node_modules in container
    command: sh -c "npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all && npm run dev"
    # For production: command: sh -c "npx sequelize-cli db:migrate && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml_utilities_frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # Access backend on host machine
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (Nginx)
    depends_on:
      - backend

volumes:
  db_data:

```