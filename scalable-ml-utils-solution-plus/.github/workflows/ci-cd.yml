  #       uses: actions/checkout@v4
  #     - name: Build and push Docker images
  #       # ... steps to login to Docker Hub, build prod images, push ...
  #     - name: Deploy to Server (e.g., SSH into server and run docker-compose pull/up)
  #       # ... use ssh actions, kubectl, ansible, etc. ...
