```ini
[alembic]
script_location = alembic
sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/chat_db

# Revision identifiers
revision_environment = false
revision_expression =
revision_id_length = 12

# Version table metadata
version_table = alembic_version
version_table_schema =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```