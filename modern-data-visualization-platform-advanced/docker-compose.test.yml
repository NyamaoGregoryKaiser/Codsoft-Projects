version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_dataviz_db
    ports:
      - "5432:5432" # Map to host port for tests to connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_dataviz_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379" # Map to host port for tests to connect