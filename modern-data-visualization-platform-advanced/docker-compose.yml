```yaml
version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: visuflow_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: visuflow_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: visuflow_backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}"
    volumes:
      - ./backend/app:/app/app # Mount source for hot-reloading in dev
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      /bin/sh -c "
      python -m alembic upgrade head &&
      python -m app.db.init_db &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: visuflow_frontend
    restart: always
    volumes:
      - ./frontend:/app # Mount source for hot-reloading in dev
      - /app/node_modules # Exclude node_modules from host mount
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000/api/v1" # This needs to be the backend's external URL if running locally
      # For Docker-internal communication, use the service name:
      # VITE_API_BASE_URL: "http://backend:8000/api/v1" # If frontend requests backend via docker-compose network
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
```