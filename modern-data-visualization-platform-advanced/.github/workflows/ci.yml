```yaml
name: VisuFlow CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations and seed data
        working-directory: ./backend
        run: |
          # Wait for DB to be ready (ensure healthcheck passes first)
          echo "Waiting for PostgreSQL..."
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo "PostgreSQL is unavailable - sleeping"
            sleep 1
          done
          echo "PostgreSQL is up and running!"
          
          # Set test specific env vars for DB and Redis
          export DATABASE_URL="postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          export REDIS_URL="redis://localhost:6379/0"
          export TESTING=True
          export FIRST_SUPERUSER_EMAIL="testadmin@visuflow.com"
          export FIRST_SUPERUSER_PASSWORD="testpassword"
          export SECRET_KEY="TEST_SECRET_KEY_FOR_TESTING_ONLY"

          # Run migrations
          alembic upgrade head
          # Seed initial data (this includes creating admin user)
          python -m app.db.init_db

      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379/0"
          TESTING: True
          SECRET_KEY: "TEST_SECRET_KEY_FOR_TESTING_ONLY"
          FIRST_SUPERUSER_EMAIL: "testadmin@visuflow.com"
          FIRST_SUPERUSER_PASSWORD: "testpassword"
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing app/tests/
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # If you use Codecov
          directory: ./backend
          fail_ci_if_error: true
          files: ./backend/coverage.xml
          flags: backend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests (e.g., Vitest, Playwright)
        working-directory: ./frontend
        run: npm test # Assuming you have a test script in package.json

      - name: Build frontend for production check
        working-directory: ./frontend
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # Only deploy on push to main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: yourdockerhubusername/visuflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: yourdockerhubusername/visuflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server (e.g., SSH and run docker-compose pull/up)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /path/to/visuflow-deployment
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f # Clean up old images
```