```nginx
# nginx.conf
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Basic rate limiting for API endpoints
    limit_req_zone $binary_remote_addr zone=api_limiter:10m rate=5r/s;

    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com; # Replace with your domain

        # Redirect HTTP to HTTPS in production
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api_limiter burst=10 nodelay; # Apply rate limiting
            proxy_pass http://backend:3000/api/; # Trailing slash is important for correct path rewriting
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # For Swagger UI static files if hosted through Nginx
        # location /api/docs {
        #     proxy_pass http://backend:3000/api/docs;
        #     proxy_set_header Host $host;
        # }
    }

