```ini
[alembic]
script_location = migrations
sqlalchemy.url = %(DATABASE_URL)s
revision_table = alembic_version
timezone = utc
# logging_config_path = alembic/logging.ini # Uncomment if you need a specific logging config for alembic

[loggers]
keys = root, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```