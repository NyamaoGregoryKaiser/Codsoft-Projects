```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install alembic if not already in requirements, often useful for migrations in CI
        pip install alembic

    - name: Set up Docker Compose
      run: |
        docker-compose up -d --build db # Start the database service only
        sleep 10 # Give PostgreSQL time to start

    - name: Run Alembic Migrations
      # Set DATABASE_URL using the service name 'db' from docker-compose
      env:
        DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/ecommerce_db # Use localhost for GIthub Action's internal network when calling from host
      run: |
        alembic upgrade head

    - name: Run Unit and Integration Tests
      env:
        DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/ecommerce_db # Use localhost for GIthub Action's internal network when calling from host
        SECRET_KEY: test_secret_key # Provide a dummy secret key for tests
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: 1
        ADMIN_EMAIL: test@example.com
        ADMIN_PASSWORD: test_password
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing tests/
        coverage report --omit="*/tests/*,*/migrations/*" # Generate coverage report

    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Required for private repos or advanced features
        files: ./coverage.xml
        fail_ci_if_error: true # Recommended to fail CI if coverage report upload fails
        verbose: true

    - name: Stop Docker Compose services
      if: always()
      run: docker-compose down

  # This job would typically be triggered after 'build-and-test'
  # and only on specific branches (e.g., main) for production deployments.
  # For brevity, this is a placeholder demonstrating the concept.
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker BuildX
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: yourusername/ecommerce-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Production (Placeholder)
      run: |
        echo "Deploying yourusername/ecommerce-app:latest to production environment..."
        # This is where you would typically have commands to deploy your application
        # to a cloud provider like AWS ECS, Kubernetes, Heroku, etc.
        # Examples:
        # - AWS CLI commands to update ECS service
        # - kubectl commands to update a Kubernetes deployment
        # - SSH into a server and run docker-compose pull && docker-compose up -d
        echo "Deployment script for production environment goes here."
        # For instance, if using SSH:
        # ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no user@your-prod-server "cd /path/to/app && docker-compose pull && docker-compose up -d"
      env:
        # Example for AWS CLI:
        # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        # AWS_REGION: us-east-1
        # KUBECONFIG: ${{ secrets.KUBECONFIG }} # For Kubernetes
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
```