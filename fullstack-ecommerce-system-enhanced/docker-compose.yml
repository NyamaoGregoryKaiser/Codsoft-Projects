```yaml
version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      # - redis # Uncomment if using Redis for caching/rate-limiting
    command: sh -c "alembic upgrade head && python scripts/seed_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:14-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  # redis:
  #   image: redis:6-alpine
  #   restart: always
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data:
```