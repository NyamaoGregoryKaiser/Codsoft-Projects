name: DBTune CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres_db:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: dbtune_test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: dbtune_test
        ports:
          - 5433:5432 # Map container's 5432 to host's 5433
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Cache Node Modules
      id: cache-node-modules
      uses: actions/cache@v3
      with:
        path: |
          ./src/server/node_modules
          ./src/client/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Backend Dependencies
      run: yarn install --frozen-lockfile
      working-directory: ./src/server

    - name: Wait for PostgreSQL to be ready
      run: |
        for i in $(seq 1 10); do
          nc -z localhost 5433 && break
          echo "Waiting for PostgreSQL... (Attempt $i/10)"
          sleep 5
        done
        psql -h localhost -p 5433 -U dbtune_test_user -d dbtune_test -c "SELECT 1" || exit 1
      env:
        PGPASSWORD: test_password

    - name: Configure Backend .env for tests
      run: |
        echo "DB_HOST=localhost" >> ./.env.test
        echo "DB_PORT=5433" >> ./.env.test # This should point to the CI's test db
        echo "DB_USER=dbtune_test_user" >> ./.env.test
        echo "DB_PASSWORD=test_password" >> ./.env.test
        echo "DB_NAME=dbtune_test" >> ./.env.test
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> ./.env.test
        echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" >> ./.env.test
        # Set additional .env vars needed for app logic (e.g., encryption keys for services)
        echo "TEST_DB_HOST=localhost" >> ./.env.test
        echo "TEST_DB_PORT=5433" >> ./.env.test
        echo "TEST_DB_USER=dbtune_test_user" >> ./.env.test
        echo "TEST_DB_PASSWORD=test_password" >> ./.env.test
        echo "TEST_DB_NAME=dbtune_test" >> ./.env.test
      working-directory: ./src/server

    - name: Run Backend Tests
      run: yarn test --ci --watchAll=false # --ci flag for CI environments
      working-directory: ./src/server

    - name: Install Frontend Dependencies
      run: yarn install --frozen-lockfile
      working-directory: ./src/client

    - name: Create Frontend .env for tests
      run: |
        echo "REACT_APP_API_BASE_URL=http://localhost:5000/api" >> ./.env
        echo "NODE_ENV=test" >> ./.env
      working-directory: ./src/client

    - name: Run Frontend Tests
      run: yarn test --ci --watchAll=false # --ci flag for CI environments
      working-directory: ./src/client

    - name: Build Docker Image
      run: docker build -t dbtune-app .

    # Example for deployment step (push to registry, deploy to K8s, etc.)
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}
    # - name: Push Docker Image
    #   run: docker push yourusername/dbtune-app:${{ github.sha }}
```

## Deployment Guide

### 1. Build Production Docker Image

```bash
docker build -t dbtune-app:latest .
```

### 2. Configure Production Environment Variables

Ensure your production environment (`.env` or orchestrator secrets) has robust values for:
*   `DB_HOST`, `DB_PORT`, `DB_USER`, `DB_PASSWORD`, `DB_NAME` (for DBTune's database)
*   `JWT_SECRET` (a very long, random string)
*   `ENCRYPTION_KEY` (a 32-character strong random string)
*   `CLIENT_URL` (your frontend domain, e.g., `https://dbtune.yourdomain.com`)
*   `REACT_APP_API_BASE_URL` (your backend API domain, e.g., `https://api.dbtune.yourdomain.com/api`)

### 3. Database Setup (DBTune's own PostgreSQL)

Ensure your production PostgreSQL instance is running and accessible.
Apply migrations and seed initial data:

```bash
# From inside your backend service container or CI/CD
cd /app/server
yarn migrate:latest
yarn seed:run
```

### 4. Running in Production (Example with Docker Compose and Nginx)

For a production setup, you would typically use a reverse proxy like Nginx to serve the static frontend files and proxy API requests to the backend.

**Example `docker-compose.prod.yml` (simplified):**
*(This would be a separate file from `docker-compose.yml` for dev)*

```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: dbtune_postgres_prod
    restart: always
    env_file:
      - .env.prod # Production specific .env
    volumes:
      - dbtune_pg_data_prod:/var/lib/postgresql/data
    networks:
      - dbtune_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbtune_backend_prod
    restart: always
    env_file:
      - .env.prod
    environment:
      DB_HOST: db
      NODE_ENV: production
      # Other sensitive env vars handled via secrets management in production
    networks:
      - dbtune_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: dbtune_nginx_prod
    restart: always
    ports:
      - "80:80" # Map host port 80 to Nginx
      # - "443:443" # For HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/client/build:/usr/share/nginx/html:ro # Serve React build
      # - ./certbot/conf:/etc/letsencrypt # For HTTPS/Certbot
      # - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - dbtune_network

networks:
  dbtune_network:
    driver: bridge

volumes:
  dbtune_pg_data_prod:
  # dbtune_certbot_conf:
  # dbtune_certbot_www:
```

**Example `nginx/nginx.conf`:**

```nginx
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com; # Replace with your domain

        location / {
            root /usr/share/nginx/html; # Serve React static files
            index index.html index.htm;
            try_files $uri $uri/ /index.html; # For React Router
        }

        location /api/ {
            proxy_pass http://backend:5000/api/; # Proxy to backend service
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optional: Setup for WebSocket if you add real-time features
        # location /ws/ {
        #     proxy_pass http://backend:5000/ws/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "Upgrade";
        #     proxy_set_header Host $host;
        # }
    }
}
```

