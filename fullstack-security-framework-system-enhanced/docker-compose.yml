version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: secure-app-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: secure_app_db
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d secure_app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secure-app-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secure-app-backend
    restart: always
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://user:password@db:5432/secure_app_db?schema=public
      JWT_SECRET: supersecretjwtkey
      JWT_ACCESS_EXPIRATION_MINUTES: 30
      JWT_REFRESH_EXPIRATION_DAYS: 7
      JWT_COOKIE_NAME_ACCESS: accessToken
      JWT_COOKIE_NAME_REFRESH: refreshToken
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      CACHE_TTL_SECONDS: 3600
      # EMAIL_USER: your_email@gmail.com
      # EMAIL_PASS: your_email_password
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevent host node_modules from overriding container's
    command: sh -c "pnpm prisma migrate deploy && pnpm prisma db seed && pnpm dev"
    # In production, use "pnpm start" instead of "pnpm dev" and remove the volume mapping for src.
    # The Dockerfile build stage already handles build for production.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secure-app-frontend
    restart: always
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # This is for local dev
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (Nginx default)
    depends_on:
      - backend

volumes:
  db-data:
  redis-data: