name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Backend Dependencies
        run: pnpm install --dir backend

      - name: Run Backend Lint
        run: pnpm lint --dir backend

      - name: Run Backend Tests
        run: pnpm test --dir backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/test_db?schema=public
          JWT_SECRET: supersecretjwtkeyforci
          JWT_ACCESS_EXPIRATION_MINUTES: 1
          JWT_REFRESH_EXPIRATION_DAYS: 1
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        # Need a temporary test database and redis for integration tests
        # For simplicity, unit tests might be run without DB. Integration tests would need docker-compose services.
        # This example assumes unit tests only, or a mocked/in-memory DB for integration.
        # For full integration tests, consider `services` block in workflow or separate job with docker-compose.

      - name: Build Backend
        run: pnpm build --dir backend

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Frontend Dependencies
        run: pnpm install --dir frontend

      - name: Run Frontend Lint
        run: pnpm lint --dir frontend

      - name: Run Frontend Tests
        run: pnpm test --dir frontend -- --watchAll=false # Run tests once without watch

      - name: Build Frontend
        run: pnpm build --dir frontend

  # deploy-backend-docker:
