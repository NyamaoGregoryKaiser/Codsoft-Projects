name: Secure Project Management CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven and Run Tests
        run: mvn clean install

      - name: Generate JaCoCo Report (if coverage check is enabled in pom.xml)
        run: mvn jacoco:report

      - name: Upload JaCoCo report to Codecov (Optional)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Set CODECOV_TOKEN in GitHub secrets
          file: target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true

  deploy-to-dockerhub:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Deploy only from main branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/secure-pm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Example for remote deployment (e.g., to a VM via SSH)
  # This job would typically involve SSHing to a server and running `docker-compose pull && docker-compose up -d`
  deploy-to-server:
    needs: deploy-to-dockerhub
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production # Optional: for environment protection rules

    steps:
      - name: Deploy to Remote Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /path/to/your/app/on/server
            docker compose pull app
            docker compose up -d
            docker system prune -f # Clean up old images
```