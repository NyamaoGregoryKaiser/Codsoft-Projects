<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>My Projects</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="dashboard-header">
            <h2>My Projects</h2>
            <a th:href="@{/projects/new}" class="btn btn-primary">Create New Project</a>
        </div>

        <div th:if="${projects.isEmpty()}" class="alert alert-info">
            No projects found. Start by creating one!
        </div>

        <div class="project-list" th:unless="${projects.isEmpty()}">
            <div class="card project-card" th:each="project : ${projects}">
                <div class="card-header">
                    <h3 th:text="${project.name}">Project Name</h3>
                </div>
                <div class="card-body">
                    <p th:text="${project.description}"></p>
                    <p><strong>Owner:</strong> <span th:text="${project.owner.username}"></span></p>
                    <p><strong>Start Date:</strong> <span th:text="${#dates.format(project.startDate, 'dd-MM-yyyy')}"></span></p>
                    <p><strong>End Date:</strong> <span th:text="${#dates.format(project.endDate, 'dd-MM-yyyy')}"></span></p>
                </div>
                <div class="card-footer">
                    <a th:href="@{/projects/{id}/tasks(id=${project.id})}" class="btn btn-secondary btn-sm">View Tasks</a>
                    <span sec:authorize="hasRole('ADMIN') or ${currentUser.id == project.owner.id}">
                        <a th:href="@{/projects/{id}/edit(id=${project.id})}" class="btn btn-info btn-sm">Edit</a>
                        <form th:action="@{/projects/{id}/delete(id=${project.id})}" method="post" style="display:inline;"
                              onsubmit="return confirm('Are you sure you want to delete this project and all its tasks and comments?');">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
