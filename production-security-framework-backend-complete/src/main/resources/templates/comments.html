<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>Comments</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="dashboard-header">
            <h2>Comments for Task #<span th:text="${taskId}"></span></h2>
        </div>

        <div th:if="${comments.isEmpty()}" class="alert alert-info">
            No comments yet. Be the first to add one!
        </div>

        <div class="comment-list" th:unless="${comments.isEmpty()}">
            <div class="card comment-card" th:each="comment : ${comments}">
                <div class="card-header">
                    <strong><span th:text="${comment.user.username}"></span></strong>
                    <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'dd-MM-yyyy HH:mm')}"></span>
                </div>
                <div class="card-body">
                    <p th:text="${comment.content}"></p>
                </div>
                <div class="card-footer" sec:authorize="hasRole('ADMIN') or ${currentUser.id == comment.user.id}">
                    <!-- For simplicity, edit/delete directly here -->
                    <form th:action="@{/projects/{projectId}/tasks/{taskId}/comments/{commentId}/delete(projectId=${projectId}, taskId=${taskId}, commentId=${comment.id})}"
                          method="post" style="display:inline;"
                          onsubmit="return confirm('Are you sure you want to delete this comment?');">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="form-card mt-4">
            <h3>Add a New Comment</h3>
            <form th:action="@{/projects/{projectId}/tasks/{taskId}/comments(projectId=${projectId}, taskId=${taskId})}"
                  th:object="${commentDTO}" method="post">
                <div class="form-group">
                    <label for="content">Your Comment:</label>
                    <textarea id="content" th:field="*{content}" rows="3" required class="form-control"></textarea>
                    <div class="text-danger" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                </div>
                <button type="submit" class="btn btn-primary">Add Comment</button>
            </form>
        </div>

        <a th:href="@{/projects/{projectId}/tasks(projectId=${projectId})}" class="btn btn-secondary mt-4">Back to Task List</a>
    </div>
</body>
</html>
