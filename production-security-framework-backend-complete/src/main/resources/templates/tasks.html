<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title th:text="${project.name} + ' Tasks'"></title>
</head>
<body>
    <div layout:fragment="content">
        <div class="dashboard-header">
            <h2 th:text="${project.name} + ' Tasks'"></h2>
            <a th:href="@{/projects/{projectId}/tasks/new(projectId=${project.id})}" class="btn btn-primary">Create New Task</a>
        </div>

        <div th:if="${tasks.isEmpty()}" class="alert alert-info">
            No tasks found for this project.
        </div>

        <div class="task-list" th:unless="${tasks.isEmpty()}">
            <div class="card task-card" th:each="task : ${tasks}">
                <div class="card-header">
                    <h4 th:text="${task.title}">Task Title</h4>
                    <span th:classappend="'status-' + ${task.status.name().toLowerCase()}" th:text="${task.status}"></span>
                </div>
                <div class="card-body">
                    <p th:text="${task.description}"></p>
                    <p><strong>Priority:</strong> <span th:classappend="'priority-' + ${task.priority.name().toLowerCase()}" th:text="${task.priority}"></span></p>
                    <p><strong>Due Date:</strong> <span th:text="${#dates.format(task.dueDate, 'dd-MM-yyyy')}"></span></p>
                    <p><strong>Assigned To:</strong> <span th:text="${task.assignedTo?.username ?: 'Unassigned'}"></span></p>
                </div>
                <div class="card-footer">
                    <a th:href="@{/projects/{projectId}/tasks/{taskId}/comments(projectId=${project.id}, taskId=${task.id})}" class="btn btn-secondary btn-sm">View Comments</a>
                    <span sec:authorize="hasRole('ADMIN') or ${currentUser.id == project.owner.id} or ${currentUser.id == task.assignedTo?.id}">
                        <a th:href="@{/projects/{projectId}/tasks/{taskId}/edit(projectId=${project.id}, taskId=${task.id})}" class="btn btn-info btn-sm">Edit</a>
                        <form th:action="@{/projects/{projectId}/tasks/{taskId}/delete(projectId=${project.id}, taskId=${task.id})}" method="post" style="display:inline;"
                              sec:authorize="hasRole('ADMIN') or ${currentUser.id == project.owner.id}"
                              onsubmit="return confirm('Are you sure you want to delete this task and all its comments?');">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </span>
                </div>
            </div>
        </div>
        <a th:href="@{/projects}" class="btn btn-secondary mt-4">Back to Projects</a>
    </div>
</body>
</html>
