```nginx
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Define the backend FastAPI server
    upstream backend_app {
        server backend:8000; # The 'backend' is the service name in docker-compose
    }

    server {
        listen 80;
        server_name localhost; # Replace with your domain in production

        # Frontend application (React static files)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # API Gateway (Proxy to FastAPI backend)
        location /api/ {
            proxy_pass http://backend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Allow large body sizes for uploads, if any
            client_max_body_size 10M;
        }

        # Serve static assets (if any, separate from React build)
        # For example, if you have a /static folder in your backend you want to expose
        # location /static/ {
        #     proxy_pass http://backend_app;
        # }
    }
}
```