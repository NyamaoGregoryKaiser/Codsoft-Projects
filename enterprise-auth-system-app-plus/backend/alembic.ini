```ini
[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate new migration scripts. Default is 'standard'.
# You can define custom templates or use 'fastapi' or 'async'.
# Example for FastAPI/async: template_script_location = %(here)s/alembic_fastapi.py.mako
# env.py setup for asyncpg requires modifications. Our env.py already has async setup.

# Logging configuration
log_config = logging.ini

# Output encoding for script files.
output_encoding = utf-8

# Name of the database table for alembic's revision tracking.
version_table = alembic_version

# SQLAlchemy connection string. Replace with your actual database URL.
# This will be overridden by env.py if it loads from config.py/environment variables.
# Example: sqlalchemy.url = postgresql+asyncpg://user:password@host:port/database_name
# For Docker, it might be the service name:
sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/secureauth_db


[logging]
version = 1
formatters =
    generic =
        format = %(levelname)-5.5s [%(name)s] %(message)s
handlers =
    console =
        class = logging.StreamHandler
        formatter = generic
        args = (sys.stderr,)
root = INFO, console
logger =
    alembic = INFO, console
    sqlalchemy = INFO, console
    asyncio = INFO, console
    sqlalchemy.engine = INFO, console
    sqlalchemy.pool = INFO, console
    sqlalchemy.dialects = INFO, console
```