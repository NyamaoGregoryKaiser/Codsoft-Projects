```yaml
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: secureauth_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_files:
      - ./.env # Uses env variables from the root .env for database
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - secureauth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-HEALTCHECK", "pg_isready", "-U", "$${POSTGRES_USER}", "-d", "$${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secureauth_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - secureauth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secureauth_backend
    restart: unless-stopped
    env_files:
      - ./.env # Uses env variables from the root .env
    environment:
      # Ensure backend env variables are picked up, or explicitly passed
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db # Service name within docker-compose network
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis # Service name within docker-compose network
      REDIS_PORT: ${REDIS_PORT}
      # Set ENV for production to disable auto-reloads etc.
      ENV: ${ENV}
    ports:
      - "8000:8000" # Expose backend directly for development, Nginx routes in prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount code for live reloading in development
    command: sh -c "alembic upgrade head && gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 app.main:app" # Run migrations, then start Gunicorn with Uvicorn workers
    # For development, you might prefer:
    # command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secureauth_frontend
    restart: unless-stopped
    env_files:
      - ./.env # Uses env variables from the root .env
    environment:
      # Pass API base URL for React build
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL}
    ports:
      - "3000:3000" # Expose frontend directly for development
    depends_on:
      backend:
        condition: service_started # Frontend doesn't strictly need backend healthy, just started for development to access API
    volumes:
      - ./frontend:/app # Mount code for live reloading in development
      - /app/node_modules # Avoid overwriting node_modules inside container
    command: npm start
    # For production build, command would be: npm run build && serve -s build -p 3000

  nginx:
    image: nginx:alpine
    container_name: secureauth_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" # For HTTPS (if configured with certs)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certbot/conf:/etc/letsencrypt # For HTTPS with certbot
      # - ./certbot/www:/var/www/certbot
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  secureauth_db_data:
  secureauth_redis_data:

```