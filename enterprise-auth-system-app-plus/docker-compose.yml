version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth_backend
    ports:
      - "8080:8080"
    environment:
      # Inject environment variables for Spring Boot
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_password
      APP_JWT_SECRET: A_VERY_STRONG_SECRET_KEY_FOR_JWT_AUTHENTICATION_SYSTEM_THAT_IS_AT_LEAST_256_BITS_LONG_AND_SHOULD_BE_KEPT_SECRET_IN_PRODUCTION_ENV_VAR
      APP_JWT_EXPIRATIONINMS: 3600000 # 1 hour
      SPRING_PROFILES_ACTIVE: prod # Use 'prod' profile for container
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"] # Requires spring-boot-starter-actuator
      interval: 10s
      timeout: 5s
      retries: 5
    # Optional: If you want to see logs from logback-spring.xml file appender inside the container
    # volumes:
    #   - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auth_frontend
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx default)
    environment:
      # Pass backend API URL to React app during build time (via .env file in React build context)
      # For Docker, it's better to provide it at runtime if possible, or during build
      # As Nginx is serving, we can proxy or set variable in Nginx config.
      # For simplicity, we assume frontend builds with this env var.
      REACT_APP_API_BASE_URL: http://localhost:8080/api/v1 # This will be built into the JS, use backend service name for internal calls
    depends_on:
      backend:
        condition: service_healthy # Wait for backend to be healthy

volumes:
  auth_db_data:
```

